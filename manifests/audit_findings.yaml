  - id: AF-002
    severity: CRITICAL
    status: RESOLVED
    title: Missing appversion field in MAER
    description: >
      MAER has no appversion field. Required for funnel analysis,
      bug attribution, and feature adoption tracking.
    impact: >
      Phase 1 mission (comparing app experience for Step 3 abandonment) requires
      app version. Resolved via DADTL join with documented coverage caveat.
    resolution_required: false
    owner: Hussain Ahmed
    linked_ticket: KAN-14
    resolution: >
      Definitive source: e_bmb_db.bmb_device_attr_detail (DADTL).
      Field: applicationversion (not appversion — legacy alias, do not use).
      Join: MAER.aid -> DADTL.aid WHERE active=1.
      SCAL.appversion rejected — sparse population.
    coverage:
      pct_range: "60-79%"
      verdict: acceptable_for_cohort_analysis
      not_suitable_for: row_level_guarantees
    null_handling: "COALESCE(d.applicationversion, 'VERSION_UNKNOWN') AS app_version"
    caveat: >
      20-40% of MAER sessions will have NULL applicationversion.
      All downstream queries must handle NULLs explicitly using COALESCE pattern.
    resolved_date: "2026-03-12"
    resolved_by: Hussain Ahmed

