tables:

  - agentic_name: MAER
    human_name: Mobile_App_Events_Raw
    source: bsl_custjrny_db.bmb_dtl
    source_hash: HASH_PENDING_ORIGINAL
    database: bsl_custjrny_db
    status: draft
    estimated_rows: "~292B rows/month"
    estimated_size: "44TB"
    partitions: null
    grain: one row per app event per session
    primary_join_keys:
      - sesn_id
      - cust_id
      - evnt_key
    notes: >
      Core mobile app event stream. Volume confirmed from EVTL cross-reference.
      NULL_CONFIRMED fields (atrb_char_1 through _40) are structurally present
      but empty in production. adobe_id also NULL_CONFIRMED.
      cust_id fallback rule: CASE WHEN cust_id > 0 THEN cust_id ELSE CAST(chnl_cust_id AS BIGINT) END
    fields:
      # --- GOLD ---
      - name: sesn_id
        agentic: MAER_sesn_id
        type: string
        classification: GOLD
        pii: false
        notes: Session identifier. Proxy for login sessions. Multiple login events in one session = 1 login.

      - name: cust_id
        agentic: MAER_cust_id
        type: bigint
        classification: GOLD
        pii: true
        notes: Primary customer identifier. Use fallback rule when null.

      - name: jrny_key
        agentic: MAER_jrny_key
        type: string
        classification: GOLD
        pii: false
        notes: Journey key. Joins to journey dimension.

      - name: jrny_sts
        agentic: MAER_jrny_sts
        type: int
        classification: GOLD
        pii: false
        notes: Journey status. 1=successful, 0=unsuccessful.

      - name: src_evnt_cd
        agentic: MAER_src_evnt_cd
        type: string
        classification: GOLD
        pii: false
        notes: "Source event code. Login codes: A001B, AU01B, TA01B, A401B, TA04B"

      - name: evnt_ts
        agentic: MAER_evnt_ts
        type: timestamp
        classification: GOLD
        pii: false
        notes: Event timestamp.

      - name: evnt_key
        agentic: MAER_evnt_key
        type: string
        classification: GOLD
        pii: false
        notes: Event key. Joins to MAER_F on evnt_key.

      - name: err_key
        agentic: MAER_err_key
        type: string
        classification: GOLD
        pii: false
        notes: "Successful login mobile: 10411766. Successful login Barclaycard: 10411688."

      - name: val
        agentic: MAER_val
        type: string
        classification: GOLD
        pii: false
        notes: Event value payload.

      # --- PII ---
      - name: tel_num
