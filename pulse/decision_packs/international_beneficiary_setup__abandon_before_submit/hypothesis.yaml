# Hypothesis declaration — shape preview, not yet validator-enforced.

cell_id: 6
screen_id: international.beneficiary.setup
signature_id: abandon_before_submit
ground_truth_expectation: positive

question_class: high_intent_drop_off_attribution

analytic:
  method: terminal_abandonment_detection
  trigger:
    requires_prior_step_completion: [corridor_select, beneficiary_entry]
    requires_dwell_above_percentile: 90
    requires_exit_without_event: payment_initiated
  exclusions:
    - session_returned_within_seconds: 1800
      reason: short-window returns suggest tab-park, not abandonment

cohort_axes:
  - age_band
  - business_vs_personal_account
  - corridor_risk_band
  - first_time_international_sender

evidence_required:
  - final_field_focused
  - final_field_value_state
  - time_on_step
  - prior_error_count
  - sanctions_disclosure_shown
  - fee_disclosure_expanded
  - exit_path
  - 24h_return_flag

remediation_categories:
  - sanctions_disclosure_clarity
  - intermediary_bank_auto_suggest
  - copy_paste_affordance_for_iban
  - save_and_resume_affordance
  - assisted_completion_offer

confidence:
  reporting: brier_calibrated
  band_method: bootstrap_ci_95

fairness:
  required_methods:
    - cohort_demographic_parity_check
    - cohort_recall_disparity
    - vulnerable_cohort_overrepresentation_check
    - corridor_risk_band_sanctions_disparity_check
  trigger_independent_review_if:
    cohort_recall_disparity_above: 0.15
    vulnerable_cohort_share_above: 0.25

audit:
  bundle_required_fields:
    - lineage_chain
    - analytic_inputs_hash
    - cohort_split_breakdown
    - threshold_config_hash
    - final_field_focus_distribution
    - sanctions_screening_decision_log_ref
    - 24h_return_rate

# --- Canvas slots (PULSE-103: actors / value_inputs / risk_inputs) ---

actors:
  - investigation_consumer
  - compliance_reviewer

value_inputs:
  severity_class: high
  vulnerable_cohort_sensitivity: true
  population_segment_addressed: uk_retail_international_payment_initiators

risk_inputs:
  regulatory_taxonomies:
    - fca_consumer_duty.outcome_4_consumer_support
    - fca_operational_resilience.ps21_3
    - fatf.recommendation_10_customer_due_diligence
  policy_areas:
    - international_payment_screening
    - sanctions_compliance
    - vulnerable_customer_handling
  chronicle_precedents:
    - CHR-friction-007
