  - id: H_VoI_001
    name: "Step 3 abandoners cite complexity in NPS verbatims"
    domain: voice_of_intent
    source_tier: COMPLAINT_DERIVED
    status: APPROVED
    journey_type: Loans
    hypothesis_text: >
      NPS verbatim responses from customers who abandoned Step 3 disproportionately
      reference complexity, confusion, or document requirements relative to completers,
      confirming that perceived complexity is a primary abandonment driver.
    description: >
      If customers are citing complexity unprompted in NPS verbatims, it corroborates
      the behavioural telemetry signals with direct customer voice evidence. This
      elevates the complexity hypothesis from DIRECTIONAL to a candidate for EVIDENCED
      status when combined with quantitative data.
      SE table or a separate NPS/verbatim source should contain relevant text.
    evidence_tier: DIRECTIONAL
    response_mode: DIRECTIONAL
    supporting_metrics:
      - "NPS verbatim mention rate: complexity/confusing/documents in abandoner vs completer cohorts"
      - "Sentiment score for Step 3 abandonment NPS responses"
      - "Theme frequency analysis on abandonment verbatims"
    evidence_requirements:
      - "NPS or customer verbatim data joinable to MA_D abandonment events"
      - "Minimum 100 verbatim responses from Step 3 abandonment cohort"
      - "Text analysis method (keyword or NLP) documented"
    minimum_effect_size: "Complexity-related terms ≥3x more frequent in abandoner vs completer verbatims"
    half_life_days: 90
    adversarial_challenger_required: false
    recommended_action:
      what_is_happening: "Customers who abandon Step 3 may be telling us in NPS responses that the form is too complex — providing qualitative validation for the quantitative signals."
      why_it_matters: "Verbatim evidence elevates the complexity hypothesis and makes the case for UX intervention more compelling to senior stakeholders."
      suggested_first_action: "Extract NPS verbatims for Step 3 abandonment cohort. Keyword search for complexity/confusing/documents. Compare frequency to completer cohort."
    date_added: "2026-03-11"

