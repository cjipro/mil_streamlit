notes: |
  No specific enforcement determination published at time of authoring.
  Included because the Treasury Committee FCA data establishes a
  cumulative-downtime base rate for the institution — useful for Pulse
  Risk to surface "this signature stacks onto an institution already
  carrying X hours of cumulative IT-resilience exposure." Sister case
  to CHR-friction-009 (Lloyds API exposure same period) — together
  they document the 2025 UK retail-banking IT-resilience pattern that
  is currently under sustained FCA scrutiny.

  Curator note: matches MIL Sonar CHR-003 (private framing) but
