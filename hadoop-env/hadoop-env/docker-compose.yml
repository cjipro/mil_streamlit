version: "3"
services:
  namenode:
    image: apache/hadoop:3.3.6
    container_name: namenode
    hostname: namenode
    command: ["hdfs", "namenode"]
    ports: ["9870:9870", "8020:8020"]
    env_file: ./config/hadoop.env
    volumes:
      - ./data/namenode:/opt/hadoop/data/nameNode
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
  datanode:
    image: apache/hadoop:3.3.6
    container_name: datanode
    command: ["hdfs", "datanode"]
    depends_on: [namenode]
    env_file: ./config/hadoop.env
    volumes:
      - ./data/datanode:/opt/hadoop/data/dataNode
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
  hue:
    image: gethue/hue:latest
    container_name: hue
    ports: ["8888:8888"]
    depends_on: [namenode]
