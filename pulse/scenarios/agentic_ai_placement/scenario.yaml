# Agentic AI placement scenario — input fixtures (PULSE-106).
#
# Each entry corresponds to one (journey × signature) cell in the
# 4-journey × 3-signature seed batch. The numbers are illustrative
# fixtures — they exercise every cell of the placement matrix
# (Diagnosis × Risk × Value combinations) so the worked example
# demonstrates the full output space, not a single dominant outcome.
#
# Real-deployment scenario inputs would be derived from the
# bank's telemetry pipeline rather than declared here.
#
# Schema per entry:
#
#   journey_id:        the journey under analysis
#   screen_class:      the screen class from the regulatory_taxonomy applicable list
#   signature_id:      the friction signature
#   pack_dir:          the corresponding pulse/decision_packs/<dir>/ subdir
#
#   diagnosis_inputs:
#     assistance_arm:
#       n_sessions, success_rate
#     no_assistance_arm:
#       n_sessions, success_rate
#
#   risk_inputs:
#     impact_metrics:
#       affected_customers_7d, vulnerable_cohort_overrep_ratio
#
#   value_inputs:
#     metrics:
#       affected_customers_7d, avg_events_per_affected_user,
#       vulnerable_cohort_share, counterfactual_baseline_pct

bank_policy:
  # Used by both Risk and Value scoring. Same shape as
  # pulse/contracts/bank_policy.yaml after strict validation.
  version: "0.1.0"
  deployment_id: "deploy-scenario-agentic-ai-placement"
  escalation_thresholds:
    affected_customers_7d_window: 500
    vulnerable_cohort_overrep_floor: 1.25
  policy_areas:
    - internal_name: "Affordability Review"
      regulatory_taxonomy: fca_consumer_duty_2.0
      regulatory_section: "PRIN 12"
  vulnerable_cohort_extensions: []
  # Per-journey-category ARPU (£/customer/month), used by Value
  # methodology v0.2 (PULSE-107) to size the COMMERCIAL-OPPORTUNITY signal.
  # Illustrative values for the worked-example scenario — choke_point
  # (credit applications) is set highest as those drive lending revenue
  # at higher £/customer than navigation friction on marketing pages.
  arpu_per_journey:
    choke_point: 42.0
    infrastructure: 18.0
    context_loss: 26.0
    behavioural_noise: 6.0

cells:

  # --- loans_apply_step3 journey ----------------------------------------

  - journey_id: loans_apply_step3
    screen_class: credit_application
    signature_id: dwell_after_error
    pack_dir: loans_apply_step3__dwell_after_error
    diagnosis_inputs:
      assistance_arm: { n_sessions: 540, success_rate: 0.58 }
      no_assistance_arm: { n_sessions: 2400, success_rate: 0.92 }
    risk_impact: { affected_customers_7d: 1850, vulnerable_cohort_overrep_ratio: 1.42 }
    value_metrics:
      affected_customers_7d: 1850
      avg_events_per_affected_user: 2.1
      vulnerable_cohort_share: 0.46
      counterfactual_baseline_pct: 0.34

  - journey_id: loans_apply_step3
    screen_class: credit_application
    signature_id: multi_back_press
    pack_dir: loans_apply_step3__multi_back_press
    diagnosis_inputs:
      assistance_arm: { n_sessions: 380, success_rate: 0.71 }
      no_assistance_arm: { n_sessions: 2400, success_rate: 0.78 }
    risk_impact: { affected_customers_7d: 420, vulnerable_cohort_overrep_ratio: 1.15 }
    value_metrics:
      affected_customers_7d: 420
      avg_events_per_affected_user: 3.4
      vulnerable_cohort_share: 0.31
      counterfactual_baseline_pct: 0.18

  - journey_id: loans_apply_step3
    screen_class: credit_application
    signature_id: abandon_before_submit
    pack_dir: loans_apply_step3__abandon_before_submit
    # Tuned to produce JOURNEY_PROBLEM diagnosis: both arms fail at
    # similar (low) rates. AI assistance can't fix this — the journey
    # itself is broken.
    diagnosis_inputs:
      assistance_arm: { n_sessions: 290, success_rate: 0.30 }
      no_assistance_arm: { n_sessions: 2400, success_rate: 0.32 }
    risk_impact: { affected_customers_7d: 1100, vulnerable_cohort_overrep_ratio: 1.38 }
    value_metrics:
      affected_customers_7d: 1100
      avg_events_per_affected_user: 1.2
      vulnerable_cohort_share: 0.51
      counterfactual_baseline_pct: 0.28

