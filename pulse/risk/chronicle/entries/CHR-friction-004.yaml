notes: |
  Long-running fair-treatment failings in how Lloyds Group handled
  customers in mortgage arrears. Customers were funnelled through process
  friction that did not properly account for individual circumstances or
  vulnerability — the kind of pattern that translates in Pulse's
  taxonomy to `unclear_remediation_path` on the mortgage_arrears screen.
  The case is one of the best-documented FCA actions linking process
  friction directly to vulnerable-cohort harm.

