<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thank you — CJI</title>

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'none'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://cjipro.com/thank-you/">

<style>
  :root {
    --ink:      #0A1E2A;
    --ink-soft: #2C3E4D;
    --muted:    #6B7A85;
    --hairline: #D8DFE5;
    --paper:    #FFFFFF;
    --accent:   #003A5C;
    --serif:    Georgia, "Times New Roman", serif;
    --sans:     -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono:     "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--sans); font-size: 16px; line-height: 1.6; }
  a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
  a:hover { border-bottom-color: var(--accent); }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 28px; }
  .topbar { border-bottom: 1px solid var(--hairline); padding: 18px 0; }
  .topbar-inner { display: flex; align-items: baseline; justify-content: space-between; }
  .brand { font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--ink); }
  .brand-sub { font-family: var(--sans); font-size: 12px; color: var(--muted); margin-left: 10px; letter-spacing: 0.3px; }
  .nav { font-size: 14px; color: var(--muted); }
  .nav a { color: var(--muted); margin-left: 22px; }
  main { padding: 96px 0 80px 0; }
  .eyebrow { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 1.6px; color: var(--muted); margin-bottom: 18px; }
  h1 { font-family: var(--serif); font-size: 36px; font-weight: 700; margin: 0 0 18px 0; color: var(--ink); letter-spacing: -0.4px; }
  p { color: var(--ink-soft); font-size: 17px; line-height: 1.6; margin: 0 0 16px 0; }
  .cta { margin-top: 36px; font-size: 14px; }
  .cta a { font-weight: 500; }
  footer { border-top: 1px solid var(--hairline); padding: 32px 0; font-size: 12px; color: var(--muted); margin-top: 80px; }
  .footer-inner { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  footer a { color: var(--muted); margin-left: 18px; }
  footer a:first-child { margin-left: 0; }
  @media (max-width: 720px) {
    h1 { font-size: 28px; }
    main { padding: 64px 0 48px 0; }
    .nav a { margin-left: 14px; font-size: 13px; }
    .brand-sub { display: none; }
  }
</style>
</head>

<body>

<header class="topbar">
  <div class="wrap topbar-inner">
    <div>
      <a href="/" style="border:0;"><span class="brand">CJI</span></a>
      <span class="brand-sub">Customer Journey Intelligence</span>
    </div>
    <nav class="nav">
      <a href="/#products">Products</a>
      <a href="/insights/">Insights</a>
      <a href="/security/">Security</a>
    </nav>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="eyebrow">Confirmation</div>
    <h1>Thank you.</h1>
    <p>
      Your message has been received. Someone from the CJI team will be in
      touch shortly. For anything time-sensitive, email
      <a href="mailto:hello@cjipro.com">hello@cjipro.com</a> directly.
    </p>
    <div class="cta">
      <a href="/">&larr; Back to CJI</a>
    </div>
  </div>
</main>

<footer>
  <div class="wrap footer-inner">
    <div>&copy; 2026 CJI</div>
    <div>
      <a href="/privacy/">Privacy</a>
      <a href="/security/">Security</a>
      <a href="mailto:hello@cjipro.com">Contact</a>
    </div>
  </div>
</footer>

</body>
</html>
