# Hypothesis declaration — shape preview, not yet validator-enforced.

cell_id: 9
screen_id: cards.credit.apply.eligibility
signature_id: abandon_before_submit
ground_truth_expectation: positive

question_class: high_intent_drop_off_attribution

analytic:
  method: terminal_abandonment_detection
  trigger:
    requires_prior_field_completion: [income_range_band, employment_status, residency_duration_years]
    requires_dwell_above_percentile: 90
    requires_exit_without_event: eligibility_check_submitted
  exclusions:
    - session_returned_within_seconds: 1800
      reason: short-window returns suggest tab-park, not abandonment

cohort_axes:
  - age_band
  - employment_type
  - new_to_credit_flag
  - existing_credit_commitments_band

evidence_required:
  - final_field_focused
  - final_field_value_state
  - time_on_step
  - prior_error_count
  - exit_path
  - 24h_return_flag
  - 7d_return_flag

remediation_categories:
  - decline_reason_transparency
  - pre_screen_eligibility_indicator
  - lower_limit_card_recommendation
  - soft_search_disclosure_clarity
  - assisted_application_offer

confidence:
  reporting: brier_calibrated
  band_method: bootstrap_ci_95

fairness:
  required_methods:
    - cohort_demographic_parity_check
    - cohort_recall_disparity
    - vulnerable_cohort_overrepresentation_check
    - closed_door_cohort_return_rate_check
  trigger_independent_review_if:
    cohort_recall_disparity_above: 0.15
    vulnerable_cohort_share_above: 0.25
    cohort_7d_return_rate_below: 0.10

audit:
  bundle_required_fields:
    - lineage_chain
    - analytic_inputs_hash
    - cohort_split_breakdown
    - threshold_config_hash
    - final_field_focus_distribution
    - 24h_return_rate
    - 7d_return_rate

# --- Canvas slots (PULSE-103: actors / value_inputs / risk_inputs) ---

actors:
  - investigation_consumer
  - compliance_reviewer

value_inputs:
  severity_class: high
  vulnerable_cohort_sensitivity: true
  population_segment_addressed: uk_retail_card_applicants

risk_inputs:
  regulatory_taxonomies:
    - fca_consumer_duty.outcome_1_products_services
    - fca_consumer_duty.outcome_3_consumer_understanding
    - fca_consumer_duty.outcome_4_consumer_support
    - eu_ai_act.high_risk_credit_scoring
  policy_areas:
    - credit_card_affordability
    - vulnerable_customer_handling
    - declined_customer_handling
  chronicle_precedents:
    - CHR-friction-005
    - CHR-friction-006
