# ============================================================
# AUDIT FINDINGS
# ============================================================

audit_findings:

  - id: AF-001
    status: OPEN
    title: Journey classification failure in production
    description: >
      MAER_F evnt_grp_nm journey classification did not work in production.
      System fell back to gateway operation codes via OCR.
      OCR cannot be removed until resolved.
    resolution_candidate: >
      BVER3 contains embedded journey taxonomy fields (journey, journey_id,
      parent_category, category, jrny_grouping). Investigate as replacement.
    priority: CRITICAL
    blocks: MAES build, OCR removal

  - id: AF-002
    status: RESOLVED
    title: Missing appversion field in MAER
    description: >
      MAER has no appversion field. Required for funnel analysis,
      bug attribution, and feature adoption tracking.
    resolution: >
      Definitive source: e_bmb_db.bmb_device_attr_detail (DADTL).
      Field: applicationversion (not appversion — legacy alias).
      Join: MAER.aid -> DADTL.aid WHERE active=1.
      SCAL.appversion rejected — sparse population, unreliable.
      Coverage query pending to confirm aid join rate.
    resolved_date: "2026-03-12"
    resolved_by: Hussain Ahmed

  - id: AF-003
    status: OPEN
    title: Registration data quality — false active registrations
    description: >
      As of 14 Feb 2025 approximately 5% of customer IDs (622K records)
      incorrectly showing active registrations in REGS.
      E-layer confirms these customers are not actually registered.
    table: REGS
    priority: MEDIUM

  - id: AF-004
    status: OPEN
    title: PII in OBRE attribute columns
    description: >
      OBRE atrb_7_val confirmed to contain real address data.
      All atrb_val fields in OBRE and similar tables should be
      treated as PII_POSSIBLE until individually confirmed.
    table: OBRE
    priority: HIGH

