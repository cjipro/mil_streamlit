# Pulse canonical event schema — v1
#
# This is the single internal data shape the Pulse engine reads. Every data
# source (taq, real_bank, future) is mapped into this shape by a per-source
# adapter. The engine never touches source-native shapes.
#
# Filed under PULSE-87 (Pulse Schema Contract, v1 design spine 2026-05-17).
# Substrate per ML-Ops panel consensus (Chip Huyen / Eugene Yan, 2026-05-17):
# Pandas + DuckDB at v1 scale. No PySpark.
#
# Naming discipline: `taq` (synthetic) and `real_bank` (production) ONLY.
# Never the real bank's name in this file or any travelling artifact.

schema:
  name: pulse_canonical_event
  version: 1.0.0  # semver — bump major on shape change, minor on additive field

canonical_event:

  envelope:
    pulse_event_id:
      type: string
      required: true
      description: UUID generated by the adapter at ingest time. Pulse-internal identifier.
    source:
      type: enum
      required: true
      values: [taq, real_bank]
      description: Which adapter ingested this event. Extends as new sources land.
    source_event_id:
      type: string
      required: true
      description: Opaque ID from the source system. Lets us trace a canonical event back to its source row.
    ingest_ts:
      type: timestamp
      required: true
      description: ISO 8601 UTC, millisecond precision. When the adapter received the event.
    ingest_pipeline_version:
      type: string
      required: true
      description: Semver of the adapter that produced this canonical event.
    ingest_batch_hash:
      type: string
      required: true
      description: SHA-256 hex of the canonical-encoded batch this event landed in. Lineage anchor.
    contract_version:
      type: string
      required: true
      description: Semver of the source contract YAML at ingest time. Lets the engine reason about backfilled corrections.

  identity:
    session_id:
      type: string
      required: true
      description: Per-session UUID. Stable across screens within a session.
    subject_id:
      type: string
      required: true
      description: Opaque subject hash. NEVER a raw customer ID. Adapter is responsible for hashing at ingest.
    cohort_tags:
      type: list[string]
      required: false
      description: Bank-defined cohort flags (e.g. ["premier", "over_50"]). Only PII-cleared flags.

  context:
    journey_id:
      type: string
      required: true
      description: From the journey taxonomy (TAQ inventory/journeys.yaml — 18 journeys at v1).
    journey_category:
      type: enum
      required: true
      values: [choke_point, context_loss, behavioural_noise, regulator, infrastructure]
      description: Derived from journey_id via the journey taxonomy.
    screen_id:
      type: string
      required: true
      description: Screen identifier within the journey. Adapter-mapped from source-native screen vocabulary.
    sequence_no:
      type: integer
      required: true
      description: Monotonic per session. Authoritative for in-session ordering (NOT event_ts — network may reorder).

  event:
    event_type:
      type: enum
      required: true
      values: [screen_view, dwell, error, field_blur, nav_intent, back_press, retry, hesitation_signal]
      description: Closed vocabulary at v1. Mirrors TAQ events.yaml. Adding a new type requires major schema bump.
    event_ts:
      type: timestamp
      required: true
      description: ISO 8601 UTC, ms precision. Source-system clock. See sequence_no for ordering.
    payload:
      type: object
      required: true
      description: Per-event-type payload. Schema documented in TAQ events.yaml; engine treats as opaque dict at v1.

# Validation rules the engine and adapters share.
validation:
  ordering:
    rule: ORDER BY sequence_no, NOT event_ts
    rationale: Network delivery may reorder. sequence_no is monotonic per session.
  deny_fields:
    rule: Adapters MUST reject any payload key listed in their contract's deny_fields. Hard failure.
    rationale: Protects PII boundary at the ingest line.
  contract_version:
    rule: Adapter stamps the contract_version it was built against on every event.
    rationale: Lets engine handle backfilled corrections after a contract bump.
