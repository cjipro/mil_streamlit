<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sonar · Ask CJI Pro</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg: #00273D;
    --card: #001E30;
    --line: #003A5C;
    --fg: #E8F4FA;
    --muted: #90B0C0;
    --accent: #0077CC;
    --teal: #1AB0A1;
    --orange: #FF8A00;
    --red: #CC3333;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex; flex-direction: column;
  }
  header {
    padding: 14px 22px;
    background: var(--card);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { margin: 0; font-size: 17px; letter-spacing: 0.5px; }
  header .tag {
    color: var(--muted); font-size: 12px; font-family: ui-monospace, Menlo, Consolas, monospace;
  }
  #thread {
    flex: 1; overflow-y: auto; padding: 22px;
    max-width: 920px; width: 100%; margin: 0 auto;
  }
  .msg { margin: 0 0 18px; }
  .msg.user { text-align: right; }
  .msg.user .bubble {
    display: inline-block; padding: 10px 14px; border-radius: 14px 14px 2px 14px;
    background: var(--accent); color: white; max-width: 75%;
  }
  .msg.bot .bubble {
    padding: 14px 16px; border-radius: 3px 14px 14px 14px;
    background: var(--card); border-left: 3px solid var(--accent);
    white-space: pre-wrap; word-wrap: break-word;
  }
  .msg.bot.refusal .bubble { border-left-color: var(--red); }
  .msg.bot.error   .bubble { border-left-color: var(--red); color: #ffb5b5; }
  .meta {
    margin-top: 6px; font-size: 11px; color: var(--muted);
    font-family: ui-monospace, Menlo, Consolas, monospace;
  }
  .conf {
    display: inline-block; margin-right: 8px; padding: 1px 7px; border-radius: 3px;
    font-weight: 700; letter-spacing: 0.5px;
  }
  .conf.evidenced   { background: rgba(26,176,161,0.18);  color: var(--teal); }
  .conf.directional { background: rgba(255,138,0,0.18);   color: var(--orange); }
  .conf.unknown     { background: rgba(204,51,51,0.18);   color: var(--red); }
  .cites { margin-top: 10px; font-size: 12px; }
  .cites details { margin-top: 6px; }
  .cites summary { color: var(--muted); cursor: pointer; }
  .cite {
    background: rgba(0,119,204,0.08); border-left: 2px solid var(--accent);
    padding: 6px 10px; margin: 4px 0; font-size: 12px;
  }
  .cite code { color: var(--orange); }
  .feedback {
    margin-top: 10px; font-size: 12px; color: var(--muted);
  }
  .feedback button {
    background: transparent; color: var(--muted); border: 1px solid var(--line);
    padding: 3px 9px; margin-right: 5px; border-radius: 3px; cursor: pointer;
    font-size: 13px;
  }
  .feedback button:hover { color: var(--fg); border-color: var(--accent); }
  form {
    display: flex; gap: 8px; padding: 14px 22px; background: var(--card);
    border-top: 1px solid var(--line); max-width: 920px; width: 100%;
    margin: 0 auto; box-sizing: border-box;
  }
  input[type=text] {
    flex: 1; background: var(--bg); color: var(--fg); border: 1px solid var(--line);
    padding: 10px 14px; border-radius: 4px; font-size: 14px; outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  button[type=submit] {
    background: var(--accent); color: white; border: 0; padding: 10px 18px;
    border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 14px;
  }
  button[type=submit]:disabled { opacity: 0.5; cursor: wait; }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 13px; }
  .empty kbd {
    background: var(--card); padding: 2px 6px; border-radius: 3px;
    font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px;
    border: 1px solid var(--line); color: var(--fg);
  }
  .suggest {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin-top: 18px; padding: 0 20px;
  }
  .suggest button {
    background: transparent; color: var(--muted); border: 1px solid var(--line);
    padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 13px;
  }
  .suggest button:hover { color: var(--fg); border-color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>Sonar · Ask CJI Pro</h1>
  <span class="tag" id="status">connecting…</span>
</header>

<div id="thread">
  <div id="empty" class="empty">
    Conversational intelligence over public UK banking market signals.<br>
    Ask about app reviews, incidents, trends, or the CHRONICLE ledger.
    <div class="suggest">
      <button data-q="Any active P0 signals?">Any active P0 signals?</button>
      <button data-q="Rank UK banks on app crashes last 30 days">Rank app crashes</button>
      <button data-q="Show me verbatim Barclays reviews about login failures">Login failure quotes</button>
      <button data-q="What does CHRONICLE say about TSB 2018?">CHRONICLE: TSB 2018</button>
    </div>
  </div>
</div>

<form id="ask-form" autocomplete="off">
  <input id="q" type="text" placeholder="Ask a question about public UK banking signals…" required>
  <button type="submit" id="go">Ask</button>
</form>

<script>
const thread = document.getElementById('thread');
const empty  = document.getElementById('empty');
const form   = document.getElementById('ask-form');
const input  = document.getElementById('q');
const btn    = document.getElementById('go');
const status = document.getElementById('status');

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function addUser(q) {
  if (empty) empty.remove();
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="bubble">${escapeHtml(q)}</div>`;
  thread.appendChild(d);
  thread.scrollTop = thread.scrollHeight;
}

function addBot(resp) {
  const kind = resp.refusal ? 'refusal' : '';
  const d = document.createElement('div');
  d.className = `msg bot ${kind}`;
  const conf = (resp.confidence || 'unknown').toLowerCase();
  let html = `<div class="bubble">${linkifyCitations(escapeHtml(resp.answer), resp.evidence)}</div>`;
  html += `<div class="meta"><span class="conf ${conf}">${conf.toUpperCase()}</span>`;
  html += `intent=${resp.intent || '-'} · retrievers=[${(resp.retrievers_used || []).join(', ')}] · `;
  html += `${resp.latency_ms}ms${resp.cache_hit ? ' · cached' : ''} · trace=${resp.trace_id}</div>`;
  if (resp.citations && resp.citations.length) {
    html += `<div class="cites"><details><summary>${resp.citations.length} citation(s)</summary>`;
    for (const cid of resp.citations) {
      const ev = (resp.evidence || []).find(e => e.id === cid);
      if (!ev) continue;
      html += `<div class="cite"><code>${escapeHtml(cid)}</code> · ${escapeHtml(ev.source)} · score ${ev.score.toFixed(2)}<br>${escapeHtml((ev.text || '').slice(0, 220))}…</div>`;
    }
    html += `</details></div>`;
  }
  if (resp.verifier_violations && resp.verifier_violations.length) {
    html += `<div class="meta" style="color:var(--orange)">verifier flagged: ${resp.verifier_violations.map(escapeHtml).join('; ')}</div>`;
  }
  html += `<div class="feedback"><button data-v="up" data-t="${resp.trace_id}">👍</button><button data-v="down" data-t="${resp.trace_id}">👎</button></div>`;
  d.innerHTML = html;
  thread.appendChild(d);
  thread.scrollTop = thread.scrollHeight;
}

function addError(msg) {
  const d = document.createElement('div');
  d.className = 'msg bot error';
  d.innerHTML = `<div class="bubble">${escapeHtml(msg)}</div>`;
  thread.appendChild(d);
  thread.scrollTop = thread.scrollHeight;
}

function linkifyCitations(html, evidence) {
  const byId = Object.fromEntries((evidence || []).map(e => [e.id, e]));
  return html.replace(/\[([^\]]+?)\]/g, (m, id) => {
    if (byId[id]) {
      return `<code style="color:var(--orange)">[${escapeHtml(id)}]</code>`;
    }
    return m;
  });
}

async function sendQuery(q) {
  addUser(q);
  btn.disabled = true;
  const busy = document.createElement('div');
  busy.className = 'msg bot';
  busy.innerHTML = `<div class="bubble" style="color:var(--muted)">retrieving evidence + synthesising…</div>`;
  thread.appendChild(busy);
  thread.scrollTop = thread.scrollHeight;

  try {
    const r = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q })
    });
    busy.remove();
    if (!r.ok) {
      addError(`HTTP ${r.status} — ${await r.text()}`);
    } else {
      addBot(await r.json());
    }
  } catch (e) {
    busy.remove();
    addError(`No response from Sonar — ${e.message}`);
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

form.addEventListener('submit', e => {
  e.preventDefault();
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  sendQuery(q);
});

document.addEventListener('click', async e => {
  if (e.target.matches('.suggest button')) {
    sendQuery(e.target.dataset.q);
  }
  if (e.target.matches('.feedback button')) {
    const btn = e.target;
    try {
      await fetch('/api/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ trace_id: btn.dataset.t, verdict: btn.dataset.v })
      });
      btn.textContent = btn.textContent + ' ✓';
      btn.disabled = true;
    } catch (_) {}
  }
});

// Health-check
fetch('/api/health').then(r => r.json()).then(d => {
  status.textContent = d.ok ? `api v${d.version} · online` : 'api degraded';
}).catch(() => status.textContent = 'api offline');
</script>
</body>
</html>
