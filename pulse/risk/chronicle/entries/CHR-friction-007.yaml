# CHR-friction-007 — HSBC Bank plc, transaction-monitoring failings → 2021 enforcement
#
# £63.9M FCA fine in December 2021 for inadequate transaction-monitoring
# controls during 2010–2018. The customer-facing friction is the
# downstream effect: legitimate customers caught by mis-calibrated rule
# sets (false-positive blocks) and conversely insufficient monitoring of
# genuine criminal activity. Pulse maps to `false_positive_block_friction`
# on the payment_initiation screen.

