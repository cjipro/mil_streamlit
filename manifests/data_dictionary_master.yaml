business_rules:

  login_operation_codes:
    values: [A001B, AU01B, TA01B, A401B, TA04B]
    field: src_evnt_cd
    tables: [MAER, OBRE]

  channel_keys:
    mobile: 10333002
    barclaycard: 10333003
    field: chnl_key

  successful_login:
    mobile:
      err_key: 10411766
      evnt_rspn_key: 15
    barclaycard:
      err_key: 10411688
      evnt_rspn_key: 66

  session_proxy_rule: >
    sesn_id = proxy for login sessions.
    Multiple login events in one session = 1 login session.

  cust_id_fallback: >
    CASE WHEN cust_id > 0 THEN cust_id
    ELSE CAST(chnl_cust_id AS BIGINT) END

  registration_active_rule: >
    active=1 AND at least 1 login in past year.
    Auto-deregistered otherwise.

  registration_complete:
    value: 100
    range: 1-100 for incomplete

  cus_class:
    P: Personal
    B: Business
    "NULL": Credit Card

  scv_suspect_exclude: >
    Exclude scv_group_status IN ('C', 'H') for all production queries.

  scv_dynamic_linking: >
    Use eff_start_dt / eff_end_dt or active='1' for point-in-time accuracy.

  identity_resolution:
    retail_banking:
      system_hub_id: "001"
      identifier: cust_id
      mapping_table: SCVC
    credit_cards:
      system_hub_id: "012"
      identifier: cardholder_id
      mapping_table: SCVH
