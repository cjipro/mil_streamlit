# FrictionBench architectural tracks — eligibility rules.
#
# Filed under PULSE-88.

version: 0.1.0

tracks:

  deterministic:
    display_name: Deterministic
    eligibility:
      - Zero LLM inference in the runtime path. Detection, analysis, and synthesis
        all proceed via classical ML, statistics, rules, classical NLP, or template
        rendering. AI-assisted dev-time tooling (code generation, prompt-engineered
        hypothesis discovery) is permitted; runtime LLM calls are not.
      - Submission must declare its full runtime dependency tree. The harness
        rejects images linking against known LLM SDKs (`anthropic`, `openai`,
        `mistralai`, etc.) at runtime — declaring `deterministic` while
        importing an LLM SDK is a verification failure.
      - Determinism: same inputs must produce byte-identical outputs across runs.
        Harness runs each submission twice and rejects above 0.1% session disagreement.
    reference_submission: pulse-v1
    notes: |
      Pulse v1 competes here. Substrate per ML-Ops panel consensus:
      Pandas + DuckDB; no PySpark.

  llm_augmented:
    display_name: LLM-Augmented
    eligibility:
      - Any LLM inference in the runtime path (detection, synthesis, or both).
      - Submission MUST declare provider, model, model_version, cost-per-investigation,
        and median + p95 latency.
      - Same determinism rule applies (0.1% disagreement floor). Submitters using
        sampling-based models should configure temperature=0 or document the
        retry / consensus mechanism they use to achieve determinism.
    reference_submission: <none at v0.1 — open for community submissions>
    notes: |
      Separate leaderboard. LLM cost + latency reported as ranking dimensions
      alongside the aggregate score.

track_membership_rules:
  - Each system declares its track in its submission manifest.
  - A system cannot appear on both leaderboards under the same name. Variants
    (e.g. `pulse-v1-deterministic` vs `pulse-v1-llm`) are separate systems.
  - Re-classification across tracks requires a new system_name and a new
    submission.

scoring_isolation:
  - Aggregate scores ARE comparable across tracks (both are 0-1 scaled).
  - But buyers comparing tracks should weight cost / latency / determinism
    differently — the leaderboard surfaces all three for the LLM track
    explicitly to make that comparison legible.
