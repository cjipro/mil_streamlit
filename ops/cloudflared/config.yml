# Cloudflare Tunnel — CJI chat backend
#
# Post-MIL-95 state. Tunnel exposes the local Python chat backend
# (mil/chat/api_server.py on :8765) on chat-backend.cjipro.com only.
# The app-cjipro Worker reverse-proxies authenticated /api/ask calls
# through this hostname.
#
# History:
#   - Pre-2026-04-26: sonar.cjipro.com was the public face for the
#     Streamlit chat UI + /api/* path. Backed up at config.yml.bak-pre-mil95.
#   - 2026-04-26 MIL-93B: app.cjipro.com/api/ask reverse-proxy lands.
#     chat-backend.cjipro.com added in addition to sonar.cjipro.com.
#   - 2026-04-26 MIL-95: sonar.cjipro.com retired. Hostname is now
#     owned by the sonar_redirect Worker which 301s to app.cjipro.com.
#     This block removed from the tunnel ingress (custom_domain on the
#     Worker takes precedence anyway — keeping it out is just hygiene).
#
# Run as Windows service ("cloudflared agent (cloudflared)").
# Restart from elevated PowerShell:
#   Restart-Service -Name cloudflared -Force

tunnel: edd552d4-92db-405e-ae87-879dc5daed6c
credentials-file: C:\Users\hussa\.cloudflared\edd552d4-92db-405e-ae87-879dc5daed6c.json

# Tunnel-wide defaults
no-autoupdate: true
loglevel: info
logfile: C:\Users\hussa\while-sleeping\mil\data\ask_api_tunnel.log

ingress:
  # chat backend public hostname for the app-cjipro Worker reverse-proxy.
  # Internal-named (not "sonar") so the Sonar product brand doesn't leak
  # into infra URLs.
  #
  # No Cloudflare Access policy on this hostname today — the Worker's own
  # auth gate (JWT cookie + approved_users) is the gate. Add a service-
  # token Access policy in a follow-up so only the Worker can call it
  # (defence in depth).
  - hostname: chat-backend.cjipro.com
    service: http://127.0.0.1:8765
    originRequest:
      connectTimeout: 10s
      noHappyEyeballs: true
      httpHostHeader: localhost

  # Catch-all — must be last, no hostname, no path
  - service: http_status:404
