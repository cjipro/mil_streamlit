# FrictionBench cell 4: international.beneficiary.setup × dwell_after_error.
# Engineered positive — long dwell following an inline validation error on a
# cross-border payee setup screen is the canonical "user got blocked, can't
# decode SWIFT/IBAN feedback" friction shape. Higher stakes than retail
# loans-step3 because every fix requires re-running sanctions / FATF logic.

pack_name: international_beneficiary_setup__dwell_after_error
pack_version: 0.1.0
required_pulse_version: ">=1.0.0,<2.0.0"
synthesis_mode: deterministic
authors:
  - CJI
license: Apache-2.0
fairness_methods_required: true
compliance_attestations:
  - name: fca_consumer_duty_2.0
    status: self_declared
    last_reviewed: 2026-05-17

description: |
  Detects dwell-after-error friction on the international beneficiary setup
  screen. Signature fires when a session shows a validation error event
  (SWIFT/BIC, IBAN checksum, sanctions hold, FATF address completeness)
  followed by a dwell window exceeding the screen's calibrated baseline at
  p<0.01. Cohort-aware: reports which cohorts (first_time_international_sender
  / language_preference / corridor_risk_band) bear the bulk of the dwell.
  Cross-border error surfaces are denser than retail forms — the error
  taxonomy is wider and the user has less prior context to decode it.

notes: |
  v0.1 showcase pack — built under HOL-7 to establish the cell-pack shape.
  Cell 4 of 12 in FrictionBench v0.1 matrix. Cross-border errors carry a
  regulatory tail (sanctions, FATF travel rule); fairness flag here is
  load-bearing because name-pattern-driven sanctions friction is a known
  disparate-impact vector.
