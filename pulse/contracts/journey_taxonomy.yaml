  payments: choke_point
  international: choke_point
  cards: context_loss
  loans: choke_point
  mortgages: choke_point
  investments: behavioural_noise
  insurance: infrastructure
  settings: infrastructure
  help: context_loss
  notifications: infrastructure
  errors: infrastructure
  marketing: infrastructure
  demo_control: infrastructure
  regulator_overlay: regulator
