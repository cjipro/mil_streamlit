# Pulse convergence — method registry.
#
# For investigations with convergence_required: true (high-stakes — regulatory
# escalation, vulnerability disparity claims, CHRONICLE-candidate entries),
# the convergence panel MUST include:
#   - at least one statistical-power method
#   - at least one fairness-aware method
#
# Three statistical methods agreeing is not convergence if they all share the
# same hidden cohort bias. A fairness-aware method exercises a different axis
# of analysis and catches that case (Krishna Gade's panel point, 2026-05-17).
#
# Filed under PULSE-89.

version: 1.0.0

categories:

  statistical_power:
    description: Tests whether the observed effect is unlikely under chance.
    methods:
      chi_squared:
        applies_to: [comparison, scope, persistence]
        notes: 2x2 or kxk contingency on cohort × outcome.
      fishers_exact:
        applies_to: [comparison, scope]
        notes: Preferred over chi-squared when any cell has expected frequency < 5.
      propensity_score_matching:
        applies_to: [cause, comparison]
        notes: Synthetic counterfactual matching for observational causal claims.

  fairness_aware:
    description: Tests whether the effect is differential across protected cohorts.
    methods:
      demographic_parity:
        applies_to: [scope, comparison, verbatim]
        notes: |
          P(outcome | cohort=A) == P(outcome | cohort=B). Detects disparate impact
          even when statistical-power methods agree on the headline.
      equalised_odds:
        applies_to: [cause, action]
        notes: |
          TPR + FPR equal across cohorts. Stronger than demographic parity for
          intervention or causal claims because it conditions on the ground truth.
      calibration_by_cohort:
        applies_to: [time, persistence, action]
        notes: |
          Predicted-vs-actual rate equal across cohorts at each predicted-probability
          bucket. Catches models that "agree on average" but mis-predict at extremes
          for one cohort.

# Per-question-class requirement: at least one fairness-aware method applicable
# to that class must be exercised for any convergence_required investigation.
# This table is the v1 "at least one example fairness-aware method per question
# class" deliverable.
example_fairness_method_per_question_class:
  scope: demographic_parity
  time: calibration_by_cohort
  cause: equalised_odds
  verbatim: demographic_parity
  comparison: demographic_parity
  persistence: calibration_by_cohort
  action: equalised_odds
