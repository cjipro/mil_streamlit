# Pulse Risk — public regulatory taxonomy v0.
#
# Public taxonomies only. Bank-internal policy areas live in
# pulse/contracts/bank_policy.yaml (per-deployment). Risk scoring crosses
# the two: regulatory_match in this file → contributes a tier-escalation
# adjustment; bank-internal policy area mapping in bank_policy.yaml →
# resolves the regulatory code onto the bank's own register at render time.
#
# Each entry pins the regulator, taxonomy_code, journey_categories and
# screen_classes the rule applies to, and a public_source citation. The
# matcher in score.py looks up entries by (journey_category, screen_class)
# and returns the union of matching taxonomy_codes.
#
# Adding a new taxonomy is a methodology_version change (the Risk-score
# output footprint changes).
#
# Filed under PULSE-99.

version: 0.1.0

taxonomies:

  - taxonomy_code: fca_consumer_duty.outcome_1_products_services
    regulator: FCA
    name: "FCA Consumer Duty Outcome 1 — Products & Services"
    applies_to:
      journey_categories: [choke_point]
      screen_classes: [credit_application, mortgage_application, account_opening]
    public_source:
      title: "FCA PS22/9 — A new Consumer Duty (Policy Statement)"
      date: "2022-07-27"

