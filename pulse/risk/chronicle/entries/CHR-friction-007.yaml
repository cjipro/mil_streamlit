notes: |
  The friction angle on AML / transaction-monitoring enforcement is two-
  sided: (a) legitimate customers blocked by mis-calibrated rule sets
  (false positives) and (b) genuine criminal activity not caught
  (false negatives). Pulse classifies the customer-facing surface as
  `false_positive_block_friction` because that is what telemetry
  observes; the underlying control failure is the regulator's concern.
  Severity P1 because the friction is high-cost-per-incident but
  low-volume vs total payment traffic — curator can re-tier if needed.

