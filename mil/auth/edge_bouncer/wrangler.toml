# MIL-61 — Cloudflare Worker Edge Bouncer
#
# Deployment pattern: this Worker sits in front of cjipro.com and
# sonar.cjipro.com, checks a WorkOS-issued session JWT against the
# WorkOS JWKS, and 302s to login.cjipro.com on miss.
#
# Safe-deploy story: `ENFORCE=false` by default. In that mode the
# Worker decides (log-only) what it would have done — redirect vs
# pass — but always passes through. Flip to `ENFORCE=true` on the
# day MIL-63 ships the magic-link flow, not before.
#
# Routes are INTENTIONALLY not populated until deployment day (see
# README). Binding this Worker to cjipro.com/briefing* while
# ENFORCE=false is harmless but also pointless — wait until MIL-63.

name = "edge-bouncer"
main = "src/index.ts"
compatibility_date = "2025-10-15"
compatibility_flags = ["nodejs_compat"]

# Routes — active from 2026-04-24 (shadow-mode activation day). The
# Worker now sits in front of every briefing path and logs decisions
# on real traffic. ENFORCE stays false until we've seen 24-72h of
# clean `pass/valid-session` logs on real JWTs from MIL-63; only
# then flip ENFORCE=true.
#
# The sonar.cjipro.com/* route is DEFERRED — binding the Bouncer
# to sonar would intercept the Ask CJI Pro tunnel at /api/*. That
# either needs PUBLIC_PATHS updated to whitelist /api/* or lives
# as a separate chunk (MIL-54 retires the sonar Access policy, at
# which point we revisit).
#
# Rollback: comment out these route blocks and redeploy. Briefings
# revert to direct GitHub Pages serving without the Bouncer in the
# request path.

[[routes]]
pattern    = "cjipro.com/briefing*"
zone_name  = "cjipro.com"

[[routes]]
pattern    = "cjipro.com/briefing-v2*"
zone_name  = "cjipro.com"

[[routes]]
pattern    = "cjipro.com/briefing-v3*"
zone_name  = "cjipro.com"

[[routes]]
pattern    = "cjipro.com/briefing-v4*"
zone_name  = "cjipro.com"

[vars]
# Non-secret, public identifiers. Match mil/config/workos.yaml
# (staging env).
ENFORCE                = "false"
SESSION_COOKIE_NAME    = "__Secure-cjipro-session"
# JWKS and issuer sourced from the AuthKit domain's OpenID config:
#   https://ideal-log-65-staging.authkit.app/.well-known/openid-configuration
# declares  "issuer": "https://ideal-log-65-staging.authkit.app"
#   and     "jwks_uri": "https://ideal-log-65-staging.authkit.app/oauth2/jwks".
# The earlier api.workos.com/sso/* values were SSO-product endpoints
# and rejected AuthKit-issued tokens with invalid-iss / JWKS mismatch.
JWKS_URL               = "https://ideal-log-65-staging.authkit.app/oauth2/jwks"
EXPECTED_AUD           = "client_01KPY7CA07ZD1WG3DMQE1FZQE1"
EXPECTED_ISS           = "https://ideal-log-65-staging.authkit.app"
LOGIN_URL              = "https://login.cjipro.com/"
RETURN_TO_PARAM        = "return_to"
JWKS_CACHE_TTL_SECONDS = "3600"

# Public route allowlist — comma-separated list of path patterns
# that bypass auth. Uses simple prefix + suffix matching in
# whitelist.ts. Edit here, not in code.
PUBLIC_PATHS = "=/,=/privacy,=/privacy/,^/.well-known/,=/robots.txt,=/sitemap.xml,=/.nojekyll"

# Dev/observability
[observability]
enabled = true

# MIL-65 — Audit log D1 binding.
#
# Commented out until the D1 database is provisioned. Activation:
#   1.  npx wrangler d1 create mil-auth-audit
#       Copy the returned database_id into the block below.
#   2.  npx wrangler d1 execute mil-auth-audit --remote \
#         --file ../audit/schema.sql
#   3.  Uncomment this block + the AUDIT_DB binding in src/index.ts' Env.
#   4.  npx wrangler deploy
#   5.  Same three steps for mil/auth/magic_link/wrangler.toml so both
#       Workers share ONE audit database — the chain needs a single
#       writer target, not two.
#
# Rollback: re-comment this block, redeploy. The Worker falls back
# to console.log-only. No D1 writes are attempted when AUDIT_DB is
# undefined.
#
# [[d1_databases]]
# binding       = "AUDIT_DB"
# database_name = "mil-auth-audit"
# database_id   = "REPLACE_WITH_D1_ID"
