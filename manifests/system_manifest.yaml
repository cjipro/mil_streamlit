schema_version: "5.0"
programme: "CJI Pulse / while-sleeping"
description: "90-Day Delivery Plan — Machine Execution Brief. Built for AI, Reviewed by Human."
day_90_vision: "Customers experiencing difficulties on Step 3 of Loans journey, abandoning — likely 45+, likely vulnerable. In last 3 days 5 customers said App journey sucks."
repo: "https://gitlab.com/streaming-analytics/while-sleeping"
jira_project: "KAN"
jira_url: "https://cjipro.atlassian.net"
owner: "Hussain Ahmed"
last_updated: "2026-03-11"
status: "ACTIVE"

programme_principles:
  - "Every Friday: something deployed, board moved, technical problem solved"
  - "Demotivation is #1 risk: short sprints, visible wins, scope protected"
  - "Manifest is source of truth: Jira is a view, never the source"
  - "Manifest executable from Day 1: not a Sprint 12 afterthought"
  - "Audit before architecture: Canonical Statement 04 is law"
  - "Semantic telemetry on every failure: every error is machine-readable"
  - "Build for future agents: all config machine-readable YAML"
  - "Human-led first release: reconstruction is not autonomous deployment authority"
  - "One command to run everything: python run_daily.py --date YYYY-MM-DD"
  - "Protect customer outcomes: Do Not Break, CONTRADICTED, vulnerable cohorts are first-class"
  - "Governance as a ramp, not a wall"
  - "AI is easy to demo. It is hard to ship. Day 90 is a shipping proof, not a demo."

dual_closure_rule: "Every ticket requires two independent closure conditions. Human done AND AI-ready done. Neither alone is sufficient. This rule applies to every ticket without exception."

adoption_hooks:
  slack_webhook: "LATENT — configure at KAN-103"
  teams_channel: "LATENT — configure at KAN-103"

governance_principles:
  total: 21
  violation_policy: "WARN_NOT_FAIL — violations emit WARN_P codes, never block builds"
  file: "manifests/governance_principles.yaml"
  principles:
    P1: "PII recorded, masked, never ignored"
    P2: "Triple naming — raw (sealed), friendly (human), agent_name (agents)"
    P3: "Two dictionaries — human gold, agentic context — from one master source"
    P4: "Raw names sealed — stored for traceability, never surfaced at any price"
    P5: "Client identity sealed — TAQ Bank is sponsor, all other client names sealed"
    P6: "Observability — freshness, quality, lineage, usage tracked per field"
    P7: "Human-in-the-loop instrumented — auditable, escalatable, overridable"
    P8: "Knowledge persistence — agents learn, institutional memory survives"
    P9: "Semantic versioning — field meanings versioned, historical analysis uses correct version"
    P10: "Purpose limitation — agents access only fields permitted for their declared purpose"
    P11: "Agent identity and lifecycle — sovereign identity, governed lifecycle, named human owner"
    P12: "Memory compartmentalisation — tenant isolation, certified memory wipe on transition"
    P13: "Adversarial resilience — Guardian Agent Layer, red teaming, circuit breakers"
    P14: "Decision provenance — glass box, tamper-evident, 7-year retention"
    P15: "Inter-agent contracts — authenticated, topology declared, handoffs logged"
    P16: "Dynamic consent — real-time consent registry, field filtering, cross-border arbitration"
    P17: "Independent validation and TEVV — staged to deployed gate, fallback tested"
    P18: "Retention and legal hold — every artifact has retention class and deletion rule"
    P19: "Third-party supply chain — SBOM, vendor registry, exit strategy"
    P20: "Customer outcome guardrails — foreseeable harm monitoring, circuit breakers"
    P21: "Fairness and bias mitigation — protected characteristics, fairness metrics mandatory"

# ============================================================
# SPRINT 1: Foundation, Manifest Model & Audit (Days 1-7)
# ============================================================

components:

  - id: KAN-10
    name: "Initialise GitLab mono-repo"
    sprint: 1
    days: "1-7"
    type: "Deployment Config"
    owner: "Hussain Ahmed"
    status: "BUILT"
    priority: P1
    estimated_effort_hours: 2
    tool: "Manual"
    jira_id: ""
    gitlab_branch: "feat/KAN-10-initialise-repo"
    manifest_path: "manifests/KAN-010_repo_manifest.md"
    gitlab_path: "/"
    purpose: "Create the canonical repository that all agents read from. Every component, config, and manifest lives here."
    inputs:
      - "GitLab account access"
    outputs:
      - "gitlab.com/streaming-analytics/while-sleeping"
      - "Mono-repo directory structure"
      - "README with one-command setup"
    dependencies: []
    acceptance_criteria:
      - "gitlab.com/streaming-analytics/while-sleeping created"
      - "Mono-repo structure: /data /agents /app /manifests /contracts /config /scripts /tests"
      - "README with one-command setup"
      - "Branch naming convention documented: feature/KAN-XXX-short-description"
      - ".gitignore excludes credentials and large data files"
    validation_command: "git clone [repo] && ls data agents app manifests contracts config scripts tests && cat README.md"
    graduated_trust_tier: 4
    runtime_permissions: ["git_push", "repo_admin"]
    recovery_patterns:
      failure_modes:
        - condition: "GitLab access issue"
          action: "Use GitHub as fallback. Document decision in hosting_decision.md. Update all manifest paths accordingly."
      retry_logic: "Manual retry after access issue resolved"
      fallback_strategy: "GitHub fallback"
      escalation_criteria: "If GitLab unavailable for >24h"
    interfaces:
      inputs_expected:
        - schema: "GitLab credentials"
          format: "environment variables"
          source: ".env"
      outputs_promised:
        - schema: "Repository structure"
          format: "git repo"
          destination: "gitlab.com/streaming-analytics/while-sleeping"
      breaking_change_protocol: "Document any directory renames in manifest before renaming"
    traceability: "Programme principle: Manifest is source of truth from Day 1"

  - id: KAN-11
    name: "Living Data Dictionary — Constitutional Foundation"
    sprint: 1
    days: "1-7"
    type: "Deployment Config"
    owner: "Hussain Ahmed"
    status: "NOT_STARTED"
    priority: P1
    estimated_effort_hours: 2
    tool: "Cursor"
    jira_id: ""
    gitlab_branch: "feature/KAN-11-table-config"
    manifest_path: "manifests/KAN-011_table_config_manifest.md"
    gitlab_path: "config/table_config.yaml"
    purpose: "Single source of truth for all tables, fields, and data contracts. Generates data_dictionary_human.yaml (curated gold, human-readable) and data_dictionary_agentic.yaml (context-rich, agent-consumable). Governed by 21 constitutional principles."
    inputs:
      - "KAN-10 (repo must exist)"
    outputs:
      - "manifests/data_dictionary_master.yaml"
      - "manifests/data_dictionary_human.yaml"
      - "manifests/data_dictionary_agentic.yaml"
    dependencies: ["KAN-10"]
    acceptance_criteria:
      - "manifests/data_dictionary_master.yaml — single source of truth for all fields"
      - "Output tables: MA_S, daily_journey_mart, voice_evidence_fact, governance_run_fact"
      - "Every pipeline reads table names from this config"
      - "grep -r for hardcoded table names returns zero results outside this file"
    validation_command: "python scripts/validate_KAN-011.py"
    graduated_trust_tier: 3
    runtime_permissions: ["read_config", "write_config"]
    recovery_patterns:
      failure_modes:
        - condition: "Table name format changes"
          action: "Update TABLE_CONFIG only. Run grep audit to confirm zero hardcoded references remain. Re-run validate_KAN-011.py."
      retry_logic: "Update config and re-run validation"
      fallback_strategy: "Document any unresolvable table name conflicts"
      escalation_criteria: "If table names cannot be confirmed by data owner"
    interfaces:
      inputs_expected:
        - schema: "Source table names"
          format: "string"
          source: "Data owner confirmation"
      outputs_promised:
        - schema: "TABLE_CONFIG YAML"
          format: "yaml"
          destination: "config/table_config.yaml"
      breaking_change_protocol: "Any table rename requires update to TABLE_CONFIG and full grep audit"
    traceability: "Programme principle: Build for future agents — all config machine-readable YAML"

  - id: data_dictionary_master
    name: "Master Data Dictionary"
    file: "manifests/data_dictionary_master.yaml"
    status: "IN_PROGRESS"
    description: "Single source of truth. Never read directly by humans or agents."
    principle_refs: [P1, P2, P3, P4, P5, P9, P10, P18]

  - id: data_dictionary_human
    name: "Human Data Dictionary"
    file: "manifests/data_dictionary_human.yaml"
    status: "IN_PROGRESS"
    description: "Curated gold fields only. Friendly names. Signed off by business owner."
    audience: human
    principle_refs: [P2, P3, P4]

  - id: data_dictionary_agentic
    name: "Agentic Data Dictionary"
    file: "manifests/data_dictionary_agentic.yaml"
    status: "IN_PROGRESS"
    description: "All fields. Agent names only. Enriched with context, observability, purpose, consent, versioning, fairness metadata."
    audience: agent
    principle_refs: [P2, P3, P6, P8, P9, P10, P16, P21]

  - id: governance_principles
    name: "Governance Principles"
    file: "manifests/governance_principles.yaml"
    status: "IN_PROGRESS"
    description: "21 constitutional principles. Machine-readable. Referenced by all manifests."
    principle_refs: [P1, P2, P3, P4, P5, P6, P7, P8, P9, P10, P11, P12, P13, P14, P15, P16, P17, P18, P19, P20, P21]

  - id: KAN-12
    name: "Set up local Docker environment"
    sprint: 1
    days: "1-7"
    type: "Deployment Config"
    owner: "Hussain Ahmed"
    status: "BUILT"
    priority: P1
    estimated_effort_hours: 3
    tool: "Claude Code"
    jira_id: ""
    gitlab_branch: "feature/KAN-12-docker-environment"
    manifest_path: "manifests/KAN-012_docker_manifest.md"
    gitlab_path: "docker-compose.yml"
    purpose: "Single command starts entire local environment. No manual setup steps."
    inputs:
      - "KAN-10"
    outputs:
      - "docker-compose.yml"
      - "config/deployment_config.yaml"
    dependencies: ["KAN-10"]
    acceptance_criteria:
      - "docker-compose.yml runs PySpark + Postgres + Streamlit + Ollama locally"
      - "docker-compose up starts everything"
      - "Health checks on all services"
      - "Port mapping documented"
      - "deployment_config.yaml defines target environment"
    validation_command: "docker-compose up -d && sleep 30 && docker-compose ps | grep -c 'Up' | grep 4"
    graduated_trust_tier: 4
    runtime_permissions: ["docker_exec", "port_binding"]
    recovery_patterns:
      failure_modes:
        - condition: "Port conflict"
          action: "Update deployment_config.yaml port mappings. Never hardcode ports in application code."
        - condition: "Ollama memory issue"
          action: "Reduce Qwen model to 7b variant in model_config.yaml. Document in manifest as DEGRADED capability."
      retry_logic: "Update config and restart docker-compose"
      fallback_strategy: "Reduce model size to 7b variant"
      escalation_criteria: "If memory insufficient for any model variant"
    interfaces:
      inputs_expected:
        - schema: "Docker config"
          format: "yaml"
          source: "config/deployment_config.yaml"
      outputs_promised:
        - schema: "Running services"
          format: "docker containers"
          destination: "localhost"
      breaking_change_protocol: "Port changes require deployment_config.yaml update and team notification"
    preferred_model:
      model: "qwen2.5-coder:14b"
      fallback: "qwen2.5:7b"
    traceability: "Programme principle: One command to run everything"

  - id: KAN-13
    name: "Document all audit findings in structured YAML"
    sprint: 1
    days: "1-7"
    type: "Control Artefact"
    owner: "Hussain Ahmed"
    status: "BUILT"
    priority: P1
    estimated_effort_hours: 2
    tool: "Cursor"
    jira_id: ""
    gitlab_branch: "feature/KAN-13-audit-findings"
    manifest_path: "manifests/KAN-013_audit_register_manifest.md"
    gitlab_path: "manifests/audit_findings.yaml"
    purpose: "Every data quality risk is named, owned, and machine-readable before any pipeline is built."
    inputs:
      - "KAN-10"
    outputs:
      - "manifests/audit_findings.yaml"
    dependencies: ["KAN-10"]
    acceptance_criteria:
      - "manifests/audit_findings.yaml with Finding 001 (cust_id -99 volume unknown)"
      - "Finding 002 (app version missing in MA_D — CRITICAL, blocks Phase 1 mission)"
      - "Finding 003 (Native flag in OPS_CD meaning unknown)"
      - "Each entry: id, severity, status, description, business_impact, action_required, owner, data_owner_signoff_required, resolution, fallback_if_unresolved"
      - "Data owner sign-off obtained before marking any finding RESOLVED"
    validation_command: "python scripts/validate_KAN-013.py"
    graduated_trust_tier: 3
    runtime_permissions: ["read_manifests", "write_manifests"]
    recovery_patterns:
      failure_modes:
        - condition: "Data owner unavailable for sign-off"
          action: "Escalate to analytics lead. Document as BLOCKED in audit_findings.yaml. Do not mark RESOLVED without sign-off."
      retry_logic: "Wait for data owner availability. Escalate after 48h."
      fallback_strategy: "Mark as BLOCKED with escalation date"
      escalation_criteria: "Data owner unavailable >48h"
    interfaces:
      inputs_expected:
        - schema: "Data quality observations"
          format: "unstructured notes"
          source: "Data owner interviews"
      outputs_promised:
        - schema: "Audit findings YAML"
          format: "yaml"
          destination: "manifests/audit_findings.yaml"
      breaking_change_protocol: "New findings must be added before any pipeline is built against affected data"
    governance_attributes:
      sensitivity_classification: "INTERNAL"
      purpose_limitation: "Data quality governance only"
      retention_period: "Programme lifetime"
      data_minimisation_notes: "Document findings only, not raw data samples"
    traceability: "Programme principle: Audit before architecture — Canonical Statement 04 is law"

  - id: KAN-14
    name: "Resolve Finding 002 — app version / experience source"
    sprint: 1
    days: "1-7"
    type: "Control Artefact"
    owner: "Hussain Ahmed"
    status: "NOT_STARTED"
    priority: P1
    estimated_effort_hours: 4
    tool: "Investigation"
    jira_id: ""
    gitlab_branch: "feature/KAN-14-finding-002"
    manifest_path: "manifests/KAN-014_appversion_manifest.md"
    gitlab_path: "manifests/audit_findings.yaml"
    purpose: "Finding 002 is CRITICAL. It blocks the entire Phase 1 mission — refreshed vs legacy comparison."
    inputs:
      - "KAN-13"
    outputs:
      - "Finding 002 marked RESOLVED or ACCEPTED-WITH-FALLBACK"
      - "config/timing_based_fallback.yaml (if fallback path)"
    dependencies: ["KAN-13"]
    acceptance_criteria:
      - "Path A: Source table identified, field name confirmed, join key to MA_D documented, TABLE_CONFIG updated, Finding 002 RESOLVED with data owner sign-off"
      - "Path B: No reliable source — timing_based_fallback.yaml documents fallback, downstream comparisons labelled DIRECTIONAL-only, Finding 002 ACCEPTED-WITH-FALLBACK"
      - "No third option"
    validation_command: "python scripts/validate_KAN-014.py"
    graduated_trust_tier: 3
    runtime_permissions: ["read_data", "write_manifests"]
    recovery_patterns:
      failure_modes:
        - condition: "Source table found but join rate low"
          action: "If >90% proceed with caveat. If <90% treat as fallback path B. No EVIDENCED classification below 90%."
        - condition: "Native flag in OPS_CD is the answer"
          action: "Investigate Finding 003 first. If Native flag maps to app_experience, use it. Document mapping logic fully."
      retry_logic: "One investigation path at a time. Document each dead end."
      fallback_strategy: "timing_based_fallback.yaml with DIRECTIONAL-only labels"
      escalation_criteria: "If investigation exceeds 4h without resolution"
    interfaces:
      inputs_expected:
        - schema: "MA_D schema"
          format: "data dictionary"
          source: "Data owner"
      outputs_promised:
        - schema: "Audit finding resolution"
          format: "yaml"
          destination: "manifests/audit_findings.yaml"
      breaking_change_protocol: "Finding 002 resolution determines all downstream comparison labelling"
    prompt_breakdown:
      steps:
        - step: 1
          description: "Read audit_findings.yaml Finding 002. List all candidate source tables for app_version field."
        - step: 2
          description: "For each candidate: check join key to MA_D, check join rate, document result."
        - step: 3
          description: "Check OPS_CD Native flag — does it map to app_experience? Document mapping logic."
        - step: 4
          description: "Make resolution decision: Path A or Path B. Document with evidence. Write to audit_findings.yaml."
    traceability: "CRITICAL — blocks entire Phase 1 mission"

  - id: KAN-15
    name: "Audit CUST_DIM — describe, sample, join key confirmation"
    sprint: 1
    days: "1-7"
    type: "Control Artefact"
    owner: "Hussain Ahmed"
    status: "NOT_STARTED"
    priority: P2
    estimated_effort_hours: 2
    tool: "Investigation"
    jira_id: ""
    gitlab_branch: "feature/KAN-15-custdim-audit"
    manifest_path: "manifests/KAN-015_custdim_audit_manifest.md"
    gitlab_path: "manifests/audit_findings.yaml"
    purpose: "Customer segmentation is core to vulnerable customer detection. Confirm what we actually have."
    inputs:
      - "KAN-13"
    outputs:
      - "CUST_DIM field mapping documented"
      - "Join key status confirmed"
    dependencies: ["KAN-13"]
    acceptance_criteria:
      - "CUST_DIM fields mapped to CJI canonical names: customer_segment, customer_tenure, historical_completion_rate, historical_digital_engagement_score"
      - "Join key to MA_S confirmed or formally blocked"
      - "Gaps logged in audit_findings.yaml"
      - "Data owner sign-off obtained"
      - "Null rates documented per field"
    validation_command: "python scripts/validate_KAN-015.py"
    graduated_trust_tier: 3
    runtime_permissions: ["read_data", "write_manifests"]
    recovery_patterns:
      failure_modes:
        - condition: "Join key missing"
          action: "Document as Finding 004. Use synthetic CUST_DIM for Phase 1. Flag all customer context fields as SYNTHETIC."
      retry_logic: "One field at a time. Escalate unknowns to data owner."
      fallback_strategy: "Synthetic CUST_DIM with SYNTHETIC flag"
      escalation_criteria: "Join key missing — escalate immediately"
    interfaces:
      inputs_expected:
        - schema: "CUST_DIM table schema"
          format: "data dictionary"
          source: "Data owner"
      outputs_promised:
        - schema: "Field mapping document"
          format: "yaml entry in audit_findings.yaml"
          destination: "manifests/audit_findings.yaml"
      breaking_change_protocol: "Join key change requires update to all downstream customer context logic"
    governance_attributes:
      sensitivity_classification: "CONFIDENTIAL"
      purpose_limitation: "Customer segmentation for journey intelligence only"
      retention_period: "Per data retention policy"
      data_minimisation_notes: "Aggregate segment only — no individual customer data in audit"
    traceability: "Day 90 vision: vulnerable customers must be identifiable"

  - id: KAN-16
    name: "Create all 90-day epics and tickets in Jira"
    sprint: 1
    days: "1-7"
    type: "Control Artefact"
    owner: "Hussain Ahmed"
    status: "NOT_STARTED"
    priority: P1
    estimated_effort_hours: 3
    tool: "generate_jira_tickets.py"
    jira_id: ""
    gitlab_branch: "feature/KAN-16-jira-setup"
    manifest_path: "manifests/KAN-016_jira_setup_manifest.md"
    gitlab_path: "scripts/generate_jira_tickets.py"
    purpose: "Jira is a view of the manifest — not the source of truth. Tickets are created from the manifest."
    inputs:
      - "KAN-17 (manifest must be committed first)"
    outputs:
      - "All epics created in Jira"
      - "All tickets with descriptions, acceptance criteria, manifest path linked"
      - "scripts/generate_jira_tickets.py"
    dependencies: ["KAN-17"]
    acceptance_criteria:
      - "All epics created"
      - "All tickets with descriptions, acceptance criteria, and manifest path linked"
      - "GitLab branch naming: feature/KAN-XXX-short-description"
      - "generate_jira_tickets.py script exists and can regenerate from manifest"
      - "Manifest index linked in Jira project description"
    validation_command: "python scripts/generate_jira_tickets.py --manifest manifests/system_manifest.yaml --dry-run"
    graduated_trust_tier: 4
    runtime_permissions: ["jira_write", "gitlab_write"]
    recovery_patterns:
      failure_modes:
        - condition: "Jira unavailable"
          action: "Use GitLab issues as fallback. Update manifest to reference GitLab issue IDs. Document in operating_model.md."
        - condition: "API rate limit"
          action: "Add sleep between API calls. Re-run script — it skips already-created tickets."
      retry_logic: "Script is idempotent — safe to re-run. Skips tickets where jira_id already populated."
      fallback_strategy: "GitLab issues as Jira fallback"
      escalation_criteria: "Jira API unavailable >4h"
    interfaces:
      inputs_expected:
        - schema: "system_manifest.yaml"
          format: "yaml"
          source: "manifests/system_manifest.yaml"
        - schema: "Jira credentials"
          format: "environment variables"
          source: ".env"
        - schema: "GitLab credentials"
          format: "environment variables"
          source: ".env"
      outputs_promised:
        - schema: "Jira tickets"
          format: "Jira issues via REST API"
          destination: "https://cjipro.atlassian.net/jira/software/projects/KAN/"
        - schema: "GitLab branches"
          format: "git branches"
          destination: "gitlab.com/streaming-analytics/while-sleeping"
        - schema: "Generation log"
          format: "yaml"
          destination: "scripts/generation_log.yaml"
      breaking_change_protocol: "Any manifest schema change requires regeneration of all tickets"
    traceability: "Programme principle: Manifest is source of truth — Jira is a view"

  - id: KAN-17
    name: "Scaffold system_manifest.yaml — complete schema with all v5 fields"
    sprint: 1
    days: "1-7"
    type: "Control Artefact"
    owner: "Hussain Ahmed"
    status: "BUILT"
    priority: P1
    estimated_effort_hours: 6
    tool: "Cursor"
    jira_id: ""
    gitlab_branch: "feature/KAN-17-system-manifest"
    manifest_path: "manifests/system_manifest.yaml"
    gitlab_path: "manifests/system_manifest.yaml"
    purpose: "Entry point for every AI agent building this system. Complete, correct, machine-readable from Day 1."
    inputs:
      - "KAN-10"
      - "CJI_Pulse_90Day_Plan_v5.docx"
    outputs:
      - "manifests/system_manifest.yaml"
    dependencies: ["KAN-10"]
    acceptance_criteria:
      - "manifests/system_manifest.yaml committed Day 1"
      - "Every component listed with ALL required fields"
      - "All v5 additions: recovery_patterns, interfaces, preferred_model, vendor, graduated_trust_tier, runtime_permissions, prompt_breakdown"
      - "Data contract manifests include governance_attributes"
      - "Validates with zero errors"
    validation_command: "python scripts/validate_KAN-017.py"
    graduated_trust_tier: 4
    runtime_permissions: ["read_manifests", "write_manifests"]
    recovery_patterns:
      failure_modes:
        - condition: "Schema validation fails"
          action: "Read validate_KAN-017.py error output. Fix field-by-field. Re-run validation. Do not proceed until validation passes."
        - condition: "Component dependency cycle detected"
          action: "Review dependency graph. Cycles are architecture errors. Resolve by introducing intermediate contract."
      retry_logic: "Fix one validation error at a time. Re-run after each fix."
      fallback_strategy: "Reduce schema to core fields for first pass, add v5 fields iteratively"
      escalation_criteria: "Dependency cycle cannot be resolved"
    interfaces:
      inputs_expected:
        - schema: "90-day plan document"
          format: "docx"
          source: "CJI_Pulse_90Day_Plan_v5.docx"
      outputs_promised:
        - schema: "Complete manifest"
          format: "yaml"
          destination: "manifests/system_manifest.yaml"
      breaking_change_protocol: "Schema version must be incremented on any field addition or removal"
    prompt_breakdown:
      steps:
        - step: 1
          description: "Read CJI_Pulse_90Day_Plan_v5.docx. Extract all KAN ticket IDs, names, efforts, dependencies, acceptance criteria."
        - step: 2
          description: "Scaffold YAML structure with programme metadata and schema_version."
        - step: 3
          description: "Add Sprint 1-3 components with all required fields."
        - step: 4
          description: "Add Sprint 4-7 components with all required fields."
        - step: 5
          description: "Add Sprint 8-13 components with all required fields."
        - step: 6
          description: "Run validate_KAN-017.py. Fix all errors. Re-run until clean."
    traceability: "THIS IS THE MANIFEST. Every other component references this as root."

  - id: KAN-18
    name: "Build build_from_manifest.py — executable manifest runner"
    sprint: 1
    days: "1-7"
    type: "Pipeline"
    owner: "Hussain Ahmed"
    status: "BUILT"
    priority: P1
    estimated_effort_hours: 5
    tool: "Claude Code"
    jira_id: ""
    gitlab_branch: "feature/KAN-18-build-from-manifest"
    manifest_path: "manifests/KAN-018_buildscript_manifest.md"
    gitlab_path: "scripts/build_from_manifest.py"
    purpose: "The manifest is not just documentation — it is executable. Bridge between manifest definition and code scaffolding."
    inputs:
      - "KAN-17"
    outputs:
      - "scripts/build_from_manifest.py"
    dependencies: ["KAN-17"]
    acceptance_criteria:
