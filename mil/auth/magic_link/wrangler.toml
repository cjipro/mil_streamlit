# MIL-63 — Magic Link Worker
#
# Deploys as a NEW Worker (`magic-link`) alongside the existing
# `login-cjipro` Worker. Routes intentionally NOT populated here —
# the new Worker lives at the workers.dev URL until chunk 3 cuts
# login.cjipro.com/* over to it (at which point the `login-cjipro`
# placeholder Worker gets either deleted or demoted to a fallback).
#
# Two secrets are REQUIRED and are NOT in this file. Set them via:
#   npx wrangler secret put WORKOS_CLIENT_SECRET
#     (paste sk_live_... or sk_test_... — the WorkOS API secret)
#   npx wrangler secret put STATE_SIGNING_KEY
#     (paste a random 32+ byte string; generate with
#      `openssl rand -base64 32` or similar)

name = "magic-link"
main = "src/index.ts"
compatibility_date = "2025-10-15"

# Staging WorkOS values — match mil/config/workos.yaml
[vars]
AUTHKIT_HOST           = "ideal-log-65-staging.authkit.app"
CLIENT_ID              = "client_01KPY7CA07ZD1WG3DMQE1FZQE1"
REDIRECT_URI           = "https://login.cjipro.com/callback"
# DEFAULT_RETURN_TO is the fallback when a user lands on this Worker
# directly (no `return_to` query param). It MUST NOT resolve to another
# auth-triggering path on this Worker — `/` would loop (callback → / →
# authorize → authkit session reuse → callback → …) until the browser
# gives up with ERR_TOO_MANY_REDIRECTS. User-supplied return_to values
# are still path-scoped by isValidReturnTo; only the admin default is
# trusted to be an absolute URL.
DEFAULT_RETURN_TO      = "https://cjipro.com/briefing-v4/"
COOKIE_NAME            = "__Secure-cjipro-session"
COOKIE_DOMAIN          = ".cjipro.com"
COOKIE_MAX_AGE_SECONDS = "3600"
RETURN_TO_PARAM        = "return_to"

# MIL-66b — admin routes verify the same session cookie as the
# edge-bouncer. These values MUST match edge_bouncer/wrangler.toml so
# the same JWT validates on both Workers.
JWKS_URL               = "https://ideal-log-65-staging.authkit.app/oauth2/jwks"
EXPECTED_AUD           = "client_01KPY7CA07ZD1WG3DMQE1FZQE1"
EXPECTED_ISS           = "https://ideal-log-65-staging.authkit.app"
JWKS_CACHE_TTL_SECONDS = "3600"

# Rollback: comment out the route below, redeploy this Worker, then
# reattach login.cjipro.com to login-cjipro in the Cloudflare dashboard
# (Workers → login-cjipro → Settings → Custom Domains → Add
# login.cjipro.com). The MIL-59 placeholder returns.
#
# Cloudflare rejects two Workers claiming the same hostname, so the
# login-cjipro custom-domain binding MUST be removed before this
# Worker deploys with the route below uncommented. That's a dashboard
# step; see ops/runbooks if it ever gets automated.

[[routes]]
pattern        = "login.cjipro.com"
custom_domain  = true
# No zone_name, no trailing /*. Custom Domains attach at the hostname
# level and route all traffic — Cloudflare manages the DNS record
# automatically.

[observability]
enabled = true

# MIL-65 — Audit log D1 binding.
#
# Must point at the SAME database_id used by edge-bouncer's
# wrangler.toml — the hash chain is global across both Workers.
# Activation steps live in ../audit/README.md; the short version:
#   1. Create the D1 once from either Worker dir.
#   2. Apply schema.sql once.
#   3. Paste the same database_id into BOTH wrangler.toml files.
#   4. Uncomment this block + the one in edge_bouncer/wrangler.toml.
#   5. Redeploy both Workers.
#
# Rollback: re-comment, redeploy. handleCallback's audit calls
# are no-ops when env.AUDIT_DB is undefined.
#
[[d1_databases]]
binding       = "AUDIT_DB"
database_name = "mil-auth-audit"
database_id   = "84acbc8b-6169-4668-ae0e-15ccfbfdf1ca"
