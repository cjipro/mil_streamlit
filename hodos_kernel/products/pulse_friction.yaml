# Pulse-like decision product — journey friction. (HODOS-4 spike)
# This whole file IS the product. No bespoke code.
product: pulse_friction

sources:
  - adapter: synthetic_journey_events
    config: {n: 600, seed: 42}

canonical:
  entity_id: session_id
  group: journey
  metrics: [dwell_ms, back_presses]
  dims: [screen, error_code]
  text: last_comment

detectors:
  - id: dwell_after_error
    label: Long dwell
    metric: dwell_ms
    op: ">="
    threshold: 20000
    severity: high
  - id: rage_back
    label: Repeated back-press
    metric: back_presses
    op: ">="
    threshold: 3
    severity: medium

decision:
  group_by: group
  entity_noun: sessions
  score:
    weights: {high: 3, medium: 2, low: 1}
  thresholds: {act: 60, watch: 15}
  action_template: "Prioritise {group}: {signal_count} friction signals across {entity_count} {entity_noun} (top: {top_signal})."

synthesis:
  template: "{verdict} — {subject}: {signal_count} signals over {entity_count} sessions ({top_signal}). {recommended_action}"

surface:
  title: "Pulse — Journey Friction (decisions)"
  altitudes: [Bank, Journey, Signal]
