# mil/config/notify_config.yaml — MIL-38 Notification Layer
#
# Set adapter to: slack | teams | email | null
# Populate the matching section with credentials.
# Leave adapter: null to disable all notifications.

adapter: slack

slack:
  webhook_url: "${SLACK_WEBHOOK_URL}"

teams:
  webhook_url: ""   # Microsoft Teams incoming webhook URL

email:
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  username:  ""           # e.g. hussain.marketing@gmail.com
  password:  ""           # app password (not account password)
  from_addr: ""
  to_addrs:
    - ""
