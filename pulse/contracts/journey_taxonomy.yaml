# Mirrors taq-app/inventory/journeys.yaml (18 journeys, 5 categories).
# Every adapter resolves canonical_event.context.journey_category from this map.
#
# Adding a journey: add the id+category pair here AND on the TAQ side. Both files
# must agree at the canonical level (drift = bug, same rule as the crossing contract).

version: 1.0.0

