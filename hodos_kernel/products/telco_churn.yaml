# Deliberately-DIFFERENT vertical — telco churn risk. (HODOS-4 spike)
# Same kernel, same engine code. Different source shape, taxonomy, detectors,
# thresholds, action language. Proves "one engine, many products" — not
# Pulse-with-a-coat-of-paint.
product: telco_churn

sources:
  - adapter: synthetic_telco_accounts
    config: {n: 500, seed: 7}

canonical:
  entity_id: account_ref
  group: segment
  metrics: [support_tickets_90d, nps, tenure_months]
  dims: []
  text: verbatim

detectors:
  - id: ticket_storm
    label: Support-ticket storm
    metric: support_tickets_90d
    op: ">="
    threshold: 3
    severity: high
  - id: detractor
    label: NPS detractor
    metric: nps
    op: "<="
    threshold: 0
    severity: medium
  - id: early_tenure
    label: Early-tenure fragility
    metric: tenure_months
    op: "<="
    threshold: 8
    severity: low

decision:
  group_by: group
  entity_noun: accounts
  score:
    weights: {high: 3, medium: 2, low: 1}
  thresholds: {act: 120, watch: 40}
  action_template: "Retention play for {group}: {signal_count} churn signals across {entity_count} {entity_noun} (top: {top_signal})."

synthesis:
  template: "{verdict} — {subject}: churn score {score:g} from {signal_count} signals ({top_signal}). {recommended_action}"

surface:
  title: "Churn Sentinel — Telco Retention (decisions)"
  altitudes: [Base, Segment, Account]
