    owner: TBD

three_layer_governance:
  layer_1_marker_library:
    description: "One row per marker only. Master catalogue of all governance markers."
    primary_owner: "Data Governance Lead"
    mandatory_reviewers: ["Privacy Lead", "AI Governance Lead", "Architecture Lead"]
    review_cycle: "Quarterly scheduled + event-driven"
    annual_attestation: true
    status: PENDING_BUILD

  layer_2_applicability_profiles:
    description: "One row per table type. Default governance decisions by profile."
    profiles:
      - raw_event_table
      - session_table
      - dimension_table
      - reference_table
      - output_table
      - pii_table
      - cross_border_table
    decision_basis_options:
      - Client Directed
      - Policy Required
      - Standard Default
      - Governance Assessed
    taq_bank_signoff_required_for:
      - business risk appetite decisions
      - exceptions to agreed defaults
      - high-risk use cases
      - customer-impacting overrides
      - material scope changes
    status: PENDING_BUILD

  layer_3_table_exceptions_register:
    description: "Used only when a specific table departs from its profile."
    expected_volume: LOW
    high_volume_signal: "Profiles need updating, not exceptions proliferating"
    status: PENDING_BUILD

reassessment_triggers:
  event_driven:
    - new constitutional principle adopted
    - regulation changes
    - new data source or field class appears
    - PII newly discovered in a table
    - purpose identifier changes
    - table changes type or grain
    - table becomes customer-facing or decision-influencing
    - cross-border processing introduced
    - risk tier increases
    - data quality issue crosses defined threshold
    - incident or near-miss or override trend or audit finding
  scheduled:
    - quarterly: Marker Library and profiles review
    - annual: Full attestation of all inherited defaults
