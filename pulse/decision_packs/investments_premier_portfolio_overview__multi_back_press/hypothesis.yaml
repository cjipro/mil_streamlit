# Hypothesis declaration — shape preview, not yet validator-enforced.

cell_id: 11
screen_id: investments.premier.portfolio.overview
signature_id: multi_back_press
ground_truth_expectation: positive

question_class: navigation_confusion_attribution

analytic:
  method: back_press_burst_detection
  trigger:
    min_back_press_events: 3
    window_seconds: 300
    same_screen_required: true
  discriminator:
    rule: inter_press_interval_under_seconds
    value: 20
    rationale: |
      Bursts of back-presses with short intervals indicate confusion;
      long intervals look like deliberate review and should not fire.
      Particularly important on a Premier portfolio screen, where deliberate
      navigation between time ranges is a normal engagement pattern.

cohort_axes:
  - client_tier
  - advised_vs_self_directed
  - age_band
  - device_class
  - time_since_last_login_band

evidence_required:
  - back_press_event_count
  - inter_press_intervals_seconds
  - prior_time_range_selection
  - active_filters_at_back_press
  - chart_state_at_back_press
  - exit_outcome

remediation_categories:
  - time_range_picker_discoverability
  - filter_state_persistence
  - chart_tooltip_clarity

confidence:
  reporting: brier_calibrated
  band_method: bootstrap_ci_95

fairness:
  required_methods:
    - cohort_demographic_parity_check
    - cohort_recall_disparity
  trigger_independent_review_if:
    cohort_recall_disparity_above: 0.15

audit:
  bundle_required_fields:
    - lineage_chain
    - analytic_inputs_hash
    - cohort_split_breakdown
    - threshold_config_hash
    - inter_press_interval_distribution
    - filter_state_at_burst_distribution

# --- Canvas slots (PULSE-103: actors / value_inputs / risk_inputs) ---

actors:
  - investigation_consumer

value_inputs:
  severity_class: low
  vulnerable_cohort_sensitivity: false
  population_segment_addressed: uk_premier_investments_clients

risk_inputs:
  regulatory_taxonomies:
    - fca_consumer_duty.outcome_2_price_value
  policy_areas:
    - premier_advisory_standards
  chronicle_precedents: []
