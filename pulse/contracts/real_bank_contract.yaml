# Pulse-side real_bank adapter contract — v0.1.0 (PLACEHOLDER)
#
# Field mappings are TBD on the work-machine side. The deny_fields list IS
# complete and load-bearing at v1: the adapter enforces it regardless of
# mapping state. This is the PII boundary.
#
# Naming discipline: `real_bank` only. Never the real bank's name. Mirrors
# MIL's P5 discipline. Same rule applies to any artifact derived from this
# file or any code that loads it.
#
# Filed under PULSE-87.

source_name: real_bank
source_type: production
adapter_module: pulse.adapters.real_bank

version: 0.1.0
adapter_version: 0.1.0

field_mappings:
  source_event_id: <TBD by real_bank data team>
  session_id: <TBD — must be session-scoped, not customer-scoped>
  subject_id: <TBD — MUST be hashed/anonymised at source, never raw customer ID>
  cohort_tags: <TBD — only PII-cleared flags>
  journey_id: <TBD — must map onto canonical journey taxonomy>
  journey_category: derived_from_journey_taxonomy
  screen_id: <TBD>
  sequence_no: <TBD>
  event_type: <TBD — must map onto canonical event vocabulary>
  event_ts: <TBD>
  payload: <TBD — must NOT contain raw transaction details>

# Hard-failure boundary. Any source event carrying one of these keys (at any
# nesting depth) raises DenyListViolation before map_event() runs.
deny_fields:
  - customer_name
  - account_number
  - sort_code
  - email
  - phone
  - postcode_full
  - dob
  - balance
  - transaction_amount
  - merchant_name
