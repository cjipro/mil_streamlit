  - id: H_RES_001
    name: "Digital literacy gap drives 45+ non-completion"
    domain: behavioural
    source_tier: RESEARCH_DERIVED
    status: PENDING
    journey_type: Loans
    hypothesis_text: >
      The primary driver of 45+ Step 3 abandonment is a digital literacy gap rather
      than form complexity per se — customers disengage because they are unfamiliar
      with the conventions of multi-step digital forms, not because the specific
      content of Step 3 is problematic.
    description: >
      Research on digital inclusion consistently shows that form abandonment in older
      cohorts is driven by low familiarity with digital form conventions (progress indicators,
      inline validation, multi-page flows) rather than content complexity alone. If true,
      this shifts the intervention from content redesign to onboarding and reassurance design.
      Requires adversarial challenge against H_BEH_001 and H_PERF hypotheses before activation.
    evidence_tier: UNKNOWN
    response_mode: UNKNOWN
    supporting_metrics:
      - "historical_digital_engagement_score vs abandonment (from H_BEH_003)"
      - "Prior digital journey completion rate from CUST_DIM"
      - "Abandonment rate controlling for form complexity score"
    evidence_requirements:
      - "CUST_DIM digital engagement score confirmed and joined"
      - "Adversarial challenge: performance hypotheses (H_PERF) ruled out as primary driver"
      - "Adversarial challenge: form complexity index derived and tested"
    minimum_effect_size: "Digital literacy score explains ≥30% of variance in abandonment after controlling for performance factors"
    half_life_days: 180
    adversarial_challenger_required: true
    adversarial_challenger_note: >
      Must be tested against H_BEH_001 (field-level abandonment) and H_PERF_001-005.
      If performance or specific-field hypotheses explain the pattern, H_RES_001 is superseded.
    recommended_action:
      what_is_happening: "45+ abandonment may be driven by digital form unfamiliarity rather than the specific content of Step 3."
      why_it_matters: "If true, the most effective intervention is reassurance and guidance design (progress visibility, plain language) rather than simplifying the specific income fields."
      suggested_first_action: "Activate only after H_BEH_001, H_BEH_003 and H_PERF_001 are evidenced. Use those results to determine whether digital literacy gap hypothesis adds explanatory power."
    date_added: "2026-03-11"

  - id: H_RES_002
    name: "Data sharing anxiety suppresses completion in vulnerable segments"
    domain: behavioural
    source_tier: RESEARCH_DERIVED
    status: PENDING
    journey_type: Loans
    hypothesis_text: >
      Customers in vulnerable segments abandon Step 3 at higher rates because they
      have elevated anxiety about sharing income and financial data digitally, driven
      by distrust of data security rather than form usability issues.
    description: >
      Research on vulnerable customer digital behaviour shows that data sharing anxiety
      is a distinct abandonment driver from usability friction. If a material proportion
      of 45+ abandonment is driven by trust deficits rather than UX, the intervention
      requires trust-building elements (security reassurance, data use explanation) not
      form simplification.
    evidence_tier: UNKNOWN
    response_mode: UNKNOWN
    supporting_metrics:
      - "Abandonment rate at income data entry vs document upload steps"
      - "NPS verbatim mentions of privacy/security/data concerns (from H_VoI_001)"
      - "Segment-level trust scores if available"
    evidence_requirements:
      - "H_VoI_001 evidenced — verbatim analysis available"
      - "Adversarial challenge: privacy-related verbatims distinct from complexity verbatims"
      - "Minimum 50 privacy-coded verbatims from abandonment cohort"
    minimum_effect_size: "Privacy/data anxiety verbatims present in ≥15% of abandonment NPS responses"
    half_life_days: 180
    adversarial_challenger_required: true
    adversarial_challenger_note: >
      Requires H_VoI_001 to be evidenced first. Adversarial challenge must distinguish
      data anxiety from complexity — these produce similar behaviour but different interventions.
    recommended_action:
      what_is_happening: "Vulnerable customers may be abandoning Step 3 because they distrust how their financial data will be used, not because the form is too hard."
      why_it_matters: "Trust-driven abandonment requires a fundamentally different intervention (explicit data use explanation, security reassurance) than UX-driven abandonment."
      suggested_first_action: "Activate after H_VoI_001 is evidenced. Code verbatims for privacy/data themes. If ≥15% of abandonment verbatims are privacy-coded, escalate to Tier 4 for activation."
    date_added: "2026-03-11"

  - id: H_RES_003
    name: "Progressive disclosure reduces abandonment on complex forms"
    domain: performance
    source_tier: RESEARCH_DERIVED
    status: PENDING
    journey_type: Loans
    hypothesis_text: >
      Restructuring Step 3 to use progressive disclosure (showing one question at a time
      rather than the full form) would reduce abandonment by at least 20% in the 45+ cohort,
      based on industry evidence from comparable financial services journeys.
    description: >
      Progressive disclosure is an evidence-based UX pattern for reducing cognitive load
      on complex digital forms. Industry benchmarks from comparable financial services
      journeys show 15-30% completion rate improvements. This hypothesis proposes applying
      it to Step 3. Requires controlled test; cannot be evidenced from observational data alone.
    evidence_tier: UNKNOWN
    response_mode: UNKNOWN
    supporting_metrics:
      - "Controlled test: completion rate — progressive vs full-form Step 3"
      - "Abandonment rate by step sub-section (field group)"
      - "Time-on-page by sub-section"
    evidence_requirements:
      - "A/B test infrastructure available for Step 3"
      - "Adversarial challenge: current form length and cognitive load scored"
      - "Benchmark: comparable journey progressive disclosure results documented"
    minimum_effect_size: "≥20% relative reduction in Step 3 abandonment rate in 45+ cohort"
    half_life_days: 180
    adversarial_challenger_required: true
    adversarial_challenger_note: >
      Hypothesis is causal and requires controlled testing. Cannot be activated as
      a directional finding from observational data. Must not be conflated with
      H_PERF or H_BEH hypotheses which are observational.
    recommended_action:
      what_is_happening: "Progressive disclosure may substantially reduce Step 3 abandonment but requires product change and controlled testing to evidence."
      why_it_matters: "If correct, it is the highest-impact single UX intervention available. If incorrect, it is a costly distraction from faster wins."
      suggested_first_action: "Do not activate until observational hypotheses (H_PERF, H_BEH) are evidenced and a product change is scoped. Flag to Tier 4 as a Sprint 4+ candidate."
    date_added: "2026-03-11"

