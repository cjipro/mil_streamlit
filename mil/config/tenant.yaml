# mil/config/tenant.yaml — single source of truth for tenant-level identity.
#
# A "tenant" is one CJI deployment — the cjipro.com hosted reference is one
# tenant; a fork running its own brand on its own domains is another tenant.
#
# The four sections below carry every value that would change between
# deployments. Edit this file (not Python source) when retargeting a fork.
#
# Schema versions:
#   1 — locale + compliance only (MIL-148, 2026-04-27)
#   2 — adds organisation / domains / urls / committer / harvester (MIL-119, 2026-04-30)
#
# A tenant.yaml at schema_version:1 still loads — the v2 fields fall back to
# the cjipro.com reference defaults baked into tenant_loader.py. A fork
# operator should bump this to 2 and replace every cjipro.com value.

schema_version: 2

# ── MIL-148 — locale + jurisdiction ──────────────────────────────────────────

# Default locale for HTML output.
lang: en-GB

# Empty by design today — reserved for future deployments needing
# jurisdiction-specific footer text (China ICP, EU explicit-consent, etc.)
compliance_notices: []

# ── MIL-119 — tenant identity ────────────────────────────────────────────────

# The organisation operating this CJI deployment. Surfaces in email senders,
# trust footers, partner-facing copy.
organisation:
  name: "CJI"
  display_name: "CJI Briefing"
  contact_email: "hello@cjipro.com"

# Domains the deployment serves. The four below are the canonical CJI split:
#   apex   — marketing site, public-facing
#   app    — auth-fenced product surface (Reckoner, Sonar, etc.)
#   login  — magic-link host
#   admin  — admin dashboard
domains:
  apex: "cjipro.com"
  app: "app.cjipro.com"
  login: "login.cjipro.com"
  admin: "admin.cjipro.com"

# Default Sonar PDB URL template. {slug} substituted at email-send time with
# the recipient firm's slug from clients.yaml.
sonar_briefing_url_template: "https://app.cjipro.com/sonar/{slug}/"

# Static fonts host. The fonts pipeline (mil/publish/fonts_pipeline/fetch_fonts.py)
# reads this to emit a Worker-side TS module that inlines @font-face rules
# with absolute URLs — necessary because Workers on app./login./admin. cannot
# resolve relative /fonts/ paths to the apex.
fonts_base_url: "https://cjipro.com/fonts"

# Git committer identity for pushed briefings. Read by GitHubPagesAdapter
# in mil/publish/adapters.py.
git_committer:
  name: "MIL Sonar Publisher"
  email: "sonar-publish@cjipro.com"

# User-Agent contact used by public-source harvesters (Reddit, etc.) so the
# upstream service can reach a human if our fetcher misbehaves.
harvester_contact_email: "mil@cjipro.com"

# ── MIL-116 — subject + peer cohort ──────────────────────────────────────────
#
# The "subject" is the firm whose customer experience this CJI deployment
# focuses on (Sonar PDB, Box 1/2/3, Inference Cards Barclays-scope). For the
# cjipro.com hosted reference instance the default subject is barclays — that
# is who the alpha cohort cares about. A fork wanting to monitor a different
# firm sets `default` here and updates `clients.yaml` accordingly.
#
# `peers` is the comparison cohort. The subject is NOT in this list; it sits
# alongside via the rate calculations in benchmark_engine.py.
#
# `briefing_subject_label` is the human-readable phrase used in the locked
# Sonar PDB email subject line. Note the cjipro.com tenant has the subject
# line locked byte-for-byte (Teams rules depend on it) — change here only
# if you understand the consequences for partner inbox filtering.
subjects:
  default: "barclays"
  default_label: "Barclays"
  briefing_subject_label: "Barclays App Experience"
  peers:
    - { slug: "natwest", label: "NatWest" }
    - { slug: "lloyds",  label: "Lloyds" }
    - { slug: "hsbc",    label: "HSBC" }
    - { slug: "monzo",   label: "Monzo" }
    - { slug: "revolut", label: "Revolut" }
