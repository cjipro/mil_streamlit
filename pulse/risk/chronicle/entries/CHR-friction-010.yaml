# CHR-friction-010 — HSBC UK + First Direct, app & online-banking outage, August 2025
#
# Five-hour outage on 27 August 2025 left HSBC UK and First Direct (shared
# infrastructure) customers unable to access accounts. Error code ERR03
# observed at scale. Service restored same afternoon. No specific FCA/PRA
# enforcement publicly recorded at time of authoring, but the case sits
# inside the broader FCA scrutiny of UK retail-banking IT resilience
# (HSBC accumulated 176 hours of downtime across 32 incidents,
# January 2023–February 2025, per Treasury Committee data). Mapped to
# `account_access_unavailable` on the account_login screen.

chronicle_id: CHR-friction-010
institution: HSBC UK Bank plc (and First Direct)
regulator: FCA
year: 2025

friction_pattern:
  signature_id: account_access_unavailable
  journey_category: infrastructure
  screen_class: account_login
  severity: P0

