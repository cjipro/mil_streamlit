# Pulse decision-pack metadata schema — required fields.
#
# Every decision pack ships a metadata.yaml at its root that conforms to this
# schema. The engine loads + validates the metadata at pack registration time;
# rejection here means the pack does not run.
#
# Filed under PULSE-89.

version: 1.0.0

required_fields:

  pack_name:
    type: string
    description: Stable identifier (kebab- or snake-case). Used as the engine registry key.

  pack_version:
    type: semver
    description: Semantic version. Bump on any pack content change.

  required_pulse_version:
    type: semver_range
    description: Range expression (e.g. ">=1.0.0,<2.0.0"). Engine refuses to load if its own version is outside.

  synthesis_mode:
    type: enum
    values: [deterministic, llm_augmented]
    description: Which synthesis provider the pack uses.
    v1_constraint: IMMUTABLE — must be 'deterministic' in v1. Validator rejects 'llm_augmented'.
    rationale: |
      The 'llm_augmented' value exists in the type so the schema is forward-compatible.
      No provider class implements it in v1. Enabling it requires a new shipped artifact
      AND a new decision-pack version AND governance review per FrictionBench LLM-track rules.

  authors:
    type: list[string]
    description: Pack maintainer attribution.

  license:
    type: string
    description: SPDX identifier (e.g. "Apache-2.0").

  fairness_methods_required:
    type: boolean
    description: |
      If true, investigations using this pack with convergence_required must include
      at least one fairness-aware method (see pulse/convergence/CONVERGENCE_DESIGN.md).
      Default true for any pack used in regulator-facing or high-stakes contexts.

  compliance_attestations:
    type: list[object]
    description: Each attestation declares a compliance framework the pack claims fitness for.
    entry_schema:
      name:
        type: string
        description: Framework identifier (e.g. "fca_consumer_duty_2.0", "uk_gdpr").
      status:
        type: enum
        values: [self_declared, independently_assessed, certified]
        description: |
          self_declared — pack author asserts fitness, no external review
          independently_assessed — external reviewer signed off (review record attached)
          certified — formal certification body attestation (certificate attached)
      last_reviewed:
        type: iso_date
        description: ISO 8601 date when status was last refreshed.

optional_fields:

  description:
    type: string
    description: One-paragraph human-readable summary of pack scope.

  notes:
    type: string
    description: Free-form maintainer notes (changelog snippets, deprecation warnings, etc.).
